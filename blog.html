<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blog Rasmi | BDP Semsira</title>
    
    <link rel="icon" type="image/png" href="semsira.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d0d0f;
            --text-main: #ffffff;
            --text-dim: #71717a;
            --accent: #e67e22; /* 延续系统的橙色配色 */
            --border: #1f1f23;
            --max-width: 1200px;
        }

        img { max-width: 100%; height: auto; display: block; }

        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0; color: var(--text-main); background: var(--bg-color);
            overflow-x: hidden;
        }

        .page-wrapper {
            display: grid;
            grid-template-columns: 280px 1fr 340px;
            gap: 0;
            max-width: var(--max-width);
            margin: 0 auto;
        }

        /* --- Sidebar Kiri --- */
        .left-sidebar {
            position: sticky; top: 0; height: 100vh;
            display: flex; flex-direction: column; padding: 50px 30px;
            border-right: 1px solid var(--border);
        }
        .nav-logo { 
            width: 55px !important; height: 55px !important; 
            border-radius: 14px; margin-bottom: 50px; 
            object-fit: contain; box-shadow: 0 5px 15px rgba(230,126,34,0.2);
        }
        .nav-item {
            display: flex; align-items: center; gap: 15px;
            padding: 16px 15px; font-size: 1rem; color: var(--text-dim);
            text-decoration: none; transition: 0.3s; cursor: pointer;
            border-radius: 12px; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background: #161618; color: var(--accent); }

        /* --- Kandungan Utama --- */
        .main-feed { padding: 40px; border-right: 1px solid var(--border); min-height: 100vh; }
        
        .search-container { 
            margin-bottom: 40px; position: sticky; top: 20px; z-index: 10;
        }
        .search-input {
            width: 100%; background: #161618; border: 1px solid var(--border);
            border-radius: 14px; padding: 16px 24px; color: #fff; font-size: 15px;
            box-sizing: border-box; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-input:focus { border-color: var(--accent); outline: none; background: #1c1c1f; }

        .post { 
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 40px; margin-bottom: 40px;
            transition: transform 0.3s, border 0.3s;
        }
        .post:hover { border-color: #333; transform: translateY(-2px); }
        .post h2 { margin: 0 0 14px 0; font-size: 1.8rem; font-weight: 800; line-height: 1.3; }
        .post small { color: var(--text-dim); font-size: 0.8rem; display: block; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; }
        
        .content { color: #d4d4d8; line-height: 1.8; font-size: 1.1rem; }
        .content img { border-radius: 16px; margin: 30px 0; border: 1px solid var(--border); width: 100%; }

        /* --- Sidebar Kanan --- */
        .right-sidebar { padding: 50px 30px; position: sticky; top: 0; }
        .info-card {
            background: #0d0d0f; border-radius: 24px; padding: 30px; 
            border: 1px solid var(--border);
        }
        .info-card h3 { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin: 0 0 20px 0; letter-spacing: 2px; }
        .info-card p { font-size: 0.95rem; line-height: 1.7; color: #a1a1aa; margin: 0; }

        .btn-discuss {
            background: var(--accent); border: none; color: #fff; padding: 12px 24px; 
            border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 13px;
            transition: 0.3s; text-transform: uppercase;
        }

        .comment-container { 
            margin-top: 30px; padding: 20px; background: #050505; 
            border-radius: 20px; border: 1px solid var(--border); 
        }

        /* --- Responsif --- */
        .mobile-header, .mobile-nav { display: none; }

        @media (max-width: 1200px) {
            .page-wrapper { grid-template-columns: 80px 1fr; }
            .right-sidebar, .nav-text { display: none; }
            .left-sidebar { align-items: center; padding: 40px 0; }
        }

        @media (max-width: 768px) {
            .page-wrapper { display: block; padding-top: 60px; padding-bottom: 100px; }
            .left-sidebar, .right-sidebar { display: none; }
            .main-feed { padding: 20px; border: none; }
            
            .mobile-header {
                display: flex; position: fixed; top: 0; left: 0; right: 0; height: 60px;
                background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--border); z-index: 1000;
                justify-content: center; align-items: center;
            }
            .mobile-header img { height: 35px; }

            .mobile-nav {
                display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
                background: rgba(13, 13, 15, 0.95); backdrop-filter: blur(20px);
                border-top: 1px solid var(--border); z-index: 1000;
                justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom);
            }
            .mobile-nav-item { font-size: 1.5rem; color: var(--text-dim); }
            .post { padding: 30px 20px; border-radius: 0; margin-bottom: 10px; border-left:none; border-right:none; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="mobile-header">
        <img src="semsira.png" alt="Logo">
    </header>

    <div class="page-wrapper">
        <aside class="left-sidebar">
            <img src="semsira.png" alt="Logo" class="nav-logo">
            <a href="index.html" class="nav-item active">
                <span>🏠</span> <span class="nav-text">Utama</span>
            </a>
            <div class="nav-item" onclick="location.reload()">
                <span>🔄</span> <span class="nav-text">Segarkan</span>
            </div>
            <a href="login.html" class="nav-item" style="margin-top: auto;">
                <span>🔐</span> <span class="nav-text">Log Masuk Admin</span>
            </a>
        </aside>

        <main class="main-feed">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Cari info atau berita...">
            </div>
            
            <div id="posts-container">
                <div style="text-align: center; color: var(--text-dim); padding: 100px 0;">Menyemak pangkalan data...</div>
            </div>
        </main>

        <aside class="right-sidebar">
            <div class="info-card">
                <h3>Mengenai BDP Semsira</h3>
                <p>Portal maklumat rasmi BDP Semsira. Kami berkongsi berita kampus, akademik dan aktiviti kepimpinan pelajar.</p>
            </div>
            <div style="padding: 30px; text-align: center;">
                <p style="font-size: 0.65rem; color: #444; letter-spacing: 1px;">
                    © 2026 BDP SEMSIRA<br>
                    POWERED BY SEMSIRA SUPER SIX
                </p>
            </div>
        </aside>
    </div>

    <nav class="mobile-nav">
        <div class="mobile-nav-item" onclick="window.scrollTo({top:0, behavior:'smooth'})">🏠</div>
        <div class="mobile-nav-item" onclick="document.getElementById('searchInput').focus()">🔍</div>
        <div class="mobile-nav-item" onclick="location.reload()">🔄</div>
    </nav>

    <script>
        const CONFIG = {
            GITHUB_USERNAME: 'bdpsemsira',
            REPO_NAME: 'bdpsemsira.github.io',
            CUSDIS_APP_ID: 'b4b009a4-de84-4d0d-9968-40fcb6be2883'
        };

        async function fetchPosts() {
            const url = `https://api.github.com/repos/${CONFIG.GITHUB_USERNAME}/${CONFIG.REPO_NAME}/issues?labels=post&state=open`;
            const container = document.getElementById('posts-container');

            try {
                const res = await fetch(url);
                const issues = await res.json();
                
                if (!issues || issues.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:#444;padding:100px 0;">Tiada artikel ditemui.</div>';
                    return;
                }

                container.innerHTML = '';
                issues.forEach(issue => {
                    const date = new Date(issue.created_at).toLocaleDateString('ms-MY', {
                        year: 'numeric', month: 'long', day: '2-digit'
                    });

                    const postEl = document.createElement('article');
                    postEl.className = 'post';
                    
                    postEl.innerHTML = `
                        <h2>${issue.title}</h2>
                        <small>DIKIRIM OLEH ADMIN • ${date}</small>
                        <div class="content">${marked.parse(issue.body || "")}</div>
                        <div style="margin-top:30px;">
                            <button class="btn-discuss" onclick="toggleComments('${issue.number}')">
                                Ruang Diskusi
                            </button>
                        </div>
                        <div id="comment-box-${issue.number}" class="hidden comment-container">
                            <div id="cusdis_thread" 
                                data-host="https://cusdis.com" 
                                data-app-id="${CONFIG.CUSDIS_APP_ID}" 
                                data-page-id="${issue.number}" 
                                data-page-url="${window.location.href}#${issue.number}" 
                                data-page-title="${issue.title}"
                                data-theme="dark">
                            </div>
                        </div>
                    `;
                    container.appendChild(postEl);
                });
            } catch (err) {
                container.innerHTML = '<div style="text-align:center;padding:100px 0;">Ralat sambungan pangkalan data.</div>';
            }
        }

        // 核心修复：点击时强制 Cusdis 渲染
        function toggleComments(id) {
            const el = document.getElementById(`comment-box-${id}`);
            const thread = el.querySelector('#cusdis_thread');
            const isHidden = el.classList.contains('hidden');
            
            el.classList.toggle('hidden');
            
            // 如果展示评论区且脚本已加载，则手动触发渲染
            if (isHidden && window.renderCusdis) {
                window.renderCusdis(thread);
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const kw = e.target.value.toLowerCase();
            document.querySelectorAll('.post').forEach(p => {
                p.style.display = p.innerText.toLowerCase().includes(kw) ? 'block' : 'none';
            });
        });

        fetchPosts();
    </script>
</body>
</html>
