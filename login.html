<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SMKSS | Log Masuk Selamat</title>
    <link rel="icon" type="image/png" href="semsira.png">
    <style>
        :root { --primary: #e67e22; --bg: #0a0a0a; --card: #181818; --input: #252525; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .info-header { position: absolute; top: 20px; right: 20px; text-align: right; font-size: 11px; font-family: monospace; opacity: 0.6; }
        
        .login-card { background: var(--card); padding: 40px; border-radius: 24px; width: 340px; text-align: center; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        .logo { width: 100px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(230, 126, 34, 0.3)); }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 5px; letter-spacing: 1px; font-weight: bold; }
        input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: var(--input); color: white; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(230, 126, 34, 0.2); }
        
        /* 新增：记住密码样式 */
        .remember-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 11px;
            color: #888;
            cursor: pointer;
        }
        .remember-group input {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
        }

        /* 新增：忘记密码链接样式 */
        .forgot-pass-link {
            display: block;
            text-align: right;
            font-size: 11px;
            color: #888;
            text-decoration: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .forgot-pass-link:hover { color: var(--primary); }

        .btn-login { 
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--primary); 
            background: var(--primary); color: white; font-weight: bold; cursor: pointer; 
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
        }
        .btn-login:hover { background: transparent; color: var(--primary); }

        .register-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            text-decoration: underline; 
            cursor: pointer;
            transition: 0.3s;
        }
        .register-link:hover { color: var(--primary); }

        #status-msg { margin-top: 15px; font-size: 12px; font-weight: bold; min-height: 1.2em; }
        .loading { color: var(--primary); } .success { color: #2ecc71; } .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="info-header">
    <div>SISTEM: DALAM TALIAN</div>
    <div>ENKRIPSI: AES-256</div>
</div>

<div class="login-card">
    <img src="semsira.png" alt="Logo" class="logo">
    <h2 style="color:var(--primary); margin:0; letter-spacing: 2px; font-size: 18px;">PAPAN PEMUKA</h2>
    <p style="font-size: 9px; color:#555; margin-bottom:25px; text-transform: uppercase;">Akses Terminal Selamat</p>

    <form id="loginForm">
        <div class="input-group">
            <label>EMEL PENGGUNA</label>
            <input type="email" id="email" placeholder="nama@email.com" required>
        </div>
        <div class="input-group">
            <label>KATA LALUAN</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <label class="remember-group">
            <input type="checkbox" id="rememberMe"> Ingat maklumat log masuk
        </label>
        
        <a href="#" id="forgotPassBtn" class="forgot-pass-link">Lupa kata laluan?</a>

        <button type="submit" id="loginBtn" class="btn-login">Sahkan Log Masuk</button>
    </form>
    
    <a href="register.html" class="register-link">Belum mempunyai akaun? Daftar di sini.</a>
    
    <div id="status-msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD1gmmXOCm1DotL_PSdyDmD6uQQoH60RHY",
        authDomain: "accountsemsira.firebaseapp.com",
        projectId: "accountsemsira",
        storageBucket: "accountsemsira.firebasestorage.app",
        messagingSenderId: "805477465040",
        appId: "1:805477465040:web:431e748fe9299d1341d7d5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginForm = document.getElementById('loginForm');
    const msg = document.getElementById('status-msg');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const forgotPassBtn = document.getElementById('forgotPassBtn');

    // --- 页面加载逻辑：读取保存的账户 ---
    window.addEventListener('DOMContentLoaded', () => {
        const savedEmail = localStorage.getItem('saved_email');
        const savedPass = localStorage.getItem('saved_pass');
        
        if (savedEmail && savedPass) {
            emailInput.value = savedEmail;
            passInput.value = savedPass;
            rememberMeCheckbox.checked = true;
        }
    });

    // --- 新增：重置密码逻辑 ---
    forgotPassBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        const email = emailInput.value;
        if (!email) {
            msg.innerText = "SILA MASUKKAN EMEL ANDA";
            msg.className = "error";
            return;
        }

        try {
            await sendPasswordResetEmail(auth, email);
            msg.innerText = "EMEL PEMULIHAN TELAH DIHANTAR";
            msg.className = "success";
        } catch (error) {
            msg.innerText = "RALAT: EMEL TIDAK DITEMUI";
            msg.className = "error";
            console.error(error);
        }
    });

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value;
        const pass = passInput.value;

        msg.innerText = "MENGESAHKAN...";
        msg.className = "loading";

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;
            
            // --- 核心逻辑：处理“记住我” ---
            if (rememberMeCheckbox.checked) {
                localStorage.setItem('saved_email', email);
                localStorage.setItem('saved_pass', pass);
            } else {
                localStorage.removeItem('saved_email');
                localStorage.removeItem('saved_pass');
            }

            msg.innerText = "AKSES DIBENARKAN";
            msg.className = "success";
            
            const finalDisplayName = user.displayName || email.split('@')[0];
            
            sessionStorage.setItem('access_granted', 'true');
            sessionStorage.setItem('admin_name', finalDisplayName);
            
            setTimeout(() => window.location.replace("sks_panel_982x.html"), 1000);
        } catch (error) {
            msg.innerText = "RALAT: MAKLUMAT TIDAK SAH";
            msg.className = "error";
            console.error(error);
        }
    });
</script>
</body>
</html>
