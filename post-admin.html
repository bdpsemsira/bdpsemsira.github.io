<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDP Admin | All-in-One Editor</title>
    <link rel="icon" type="image/png" href="semsira.png">
    <style>
        :root { --primary: #e67e22; --bg: #050505; --card: #121212; --border: #222; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .admin-container { max-width: 1000px; margin: 0 auto; background: var(--card); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* Tab Navigation */
        .tab-nav { display: flex; background: #181818; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 18px; border: none; background: none; color: #666; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: rgba(230,126,34,0.05); }

        .tab-content { padding: 35px; display: none; }
        .tab-content.active { display: block; }

        /* Form Elements */
        label { display: block; font-size: 11px; color: #888; margin: 20px 0 8px 5px; text-transform: uppercase; letter-spacing: 1.5px; }
        input, textarea, select { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        input:focus, textarea:focus { border-color: var(--primary); }

        /* Editor Specific */
        .editor-wrapper { position: relative; margin-top: 10px; }
        .drop-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(230, 126, 34, 0.15); border: 2px dashed var(--primary); border-radius: 12px; z-index: 10; pointer-events: none; justify-content: center; align-items: center; font-weight: bold; }
        
        /* Post List Specific */
        .post-item { background: #181818; border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; padding: 18px; margin-top: 20px; font-size: 16px; }
        .btn-edit { background: #3498db; color: white; margin-right: 8px; }
        .btn-close { background: #e74c3c; color: white; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: var(--card); width: 90%; max-width: 700px; padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="admin-container">
    <nav class="tab-nav">
        <button class="tab-btn active" onclick="showTab('write-tab')">✍️ Tulis Baru</button>
        <button class="tab-btn" onclick="showTab('manage-tab'); loadPosts();">📂 Urus Artikel</button>
    </nav>

    <div id="write-tab" class="tab-content active">
        <label>GitHub Access Token</label>
        <input type="password" id="ghToken" placeholder="Masukkan ghp_ token anda...">

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
            <div>
                <label>Tajuk Post</label>
                <input type="text" id="postTitle" placeholder="Contoh: Kejohanan Sukan 2026">
            </div>
            <div>
                <label>Kategori</label>
                <select id="postLabel">
                    <option value="post">Blog (Post)</option>
                    <option value="poster">Poster (Hebahan)</option>
                </select>
            </div>
        </div>

        <label>Kandungan (Seret gambar/video ke sini)</label>
        <div class="editor-wrapper" id="dropZone">
            <textarea id="postBody" rows="12" placeholder="Tulis artikel anda..."></textarea>
            <div class="drop-overlay" id="dropOverlay">LEPASKAN FAIL</div>
        </div>
        <button class="btn btn-primary" onclick="publishPost()">Terbitkan Sekarang</button>
        <div id="writeStatus" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
    </div>

    <div id="manage-tab" class="tab-content">
        <div id="loading" style="text-align:center; padding:40px; color:#555;">Memuatkan data dari GitHub...</div>
        <div id="postList"></div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-box">
        <h3 style="color:var(--primary); margin-top:0;">Kemaskini Artikel</h3>
        <input type="text" id="editTitle" style="margin-bottom:15px;">
        <textarea id="editBody" rows="10"></textarea>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button class="btn" onclick="closeModal()" style="background:#444; color:white;">Batal</button>
            <button class="btn" onclick="saveEdit()" style="background:#2ecc71; color:white;">Simpan</button>
        </div>
    </div>
</div>

<script>
    const repo = "bdpsemsira/bdpsemsira.github.io";
    let currentEditId = null;

    // --- Tab Switching Logic ---
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- Memory & Initialization ---
    window.onload = () => {
        const saved = localStorage.getItem('bdp_admin_token');
        if (saved) document.getElementById('ghToken').value = saved;
    };

    // --- Post Logic (Write) ---
    async function publishPost() {
        const token = document.getElementById('ghToken').value;
        const title = document.getElementById('postTitle').value;
        const body = document.getElementById('postBody').value;
        const label = document.getElementById('postLabel').value;
        const status = document.getElementById('writeStatus');

        if(!token || !title || !body) { alert("Sila isi semua info!"); return; }
        localStorage.setItem('bdp_admin_token', token);

        status.innerText = "⏳ Menghantar...";
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/issues`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ title, body, labels: [label] })
            });
            if(res.ok) {
                status.innerText = "✅ Berjaya Diterbitkan!";
                status.style.color = "#2ecc71";
                document.getElementById('postTitle').value = "";
                document.getElementById('postBody').value = "";
            }
        } catch(e) { status.innerText = "❌ Gagal sambungan."; }
    }

    // --- Manage Logic (List & Edit) ---
    async function loadPosts() {
        const token = document.getElementById('ghToken').value;
        const listDiv = document.getElementById('postList');
        const loading = document.getElementById('loading');
        
        if(!token) { alert("Sila masukkan Token di tab 'Tulis Baru' dahulu."); return; }
        
        loading.style.display = "block";
        listDiv.innerHTML = "";

        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/issues?state=open`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const issues = await res.json();
            loading.style.display = "none";

            issues.forEach(issue => {
                if(!issue.labels.some(l => l.name === 'post' || l.name === 'poster')) return;
                
                const item = document.createElement('div');
                item.className = 'post-item';
                item.innerHTML = `
                    <div>
                        <small style="color:var(--primary)">#${issue.number} ${issue.labels[0].name.toUpperCase()}</small>
                        <div style="font-weight:bold; margin-top:4px;">${issue.title}</div>
                    </div>
                    <div>
                        <button class="btn btn-edit" onclick="openEdit(${issue.number}, \`${encodeURIComponent(issue.title)}\`, \`${encodeURIComponent(issue.body)}\`)">Edit</button>
                        <button class="btn btn-close" onclick="closePost(${issue.number})">Close</button>
                    </div>
                `;
                listDiv.appendChild(item);
            });
        } catch(e) { loading.innerText = "Ralat memuatkan data."; }
    }

    // Modal Control
    function openEdit(id, title, body) {
        currentEditId = id;
        document.getElementById('editTitle').value = decodeURIComponent(title);
        document.getElementById('editBody').value = decodeURIComponent(body);
        document.getElementById('editModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    async function saveEdit() {
        const token = document.getElementById('ghToken').value;
        const title = document.getElementById('editTitle').value;
        const body = document.getElementById('editBody').value;
        
        const res = await fetch(`https://api.github.com/repos/${repo}/issues/${currentEditId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${token}` },
            body: JSON.stringify({ title, body })
        });
        if(res.ok) { closeModal(); loadPosts(); }
    }

    async function closePost(id) {
        if(!confirm("Padam artikel ini dari blog?")) return;
        const token = document.getElementById('ghToken').value;
        await fetch(`https://api.github.com/repos/${repo}/issues/${id}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${token}` },
            body: JSON.stringify({ state: 'closed' })
        });
        loadPosts();
    }

    // --- Drag & Drop ---
    const dropZone = document.getElementById('dropZone');
    const dropOverlay = document.getElementById('dropOverlay');
    dropZone.addEventListener('dragenter', (e) => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
    dropZone.addEventListener('dragleave', () => dropOverlay.style.display = 'none');
    dropZone.addEventListener('dragover', (e) => e.preventDefault());
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropOverlay.style.display = 'none';
        const file = e.dataTransfer.files[0];
        const url = prompt(`Fail: ${file.name}\nSila masukkan URL (Upload ke GitHub dahulu):`);
        if(url) {
            let tag = file.type.startsWith('video/') ? `\n<video controls style="width:100%"><source src="${url}"></video>\n` : `![${file.name}](${url})`;
            const body = document.getElementById('postBody');
            body.setRangeText(tag, body.selectionStart, body.selectionEnd, 'end');
        }
    });
</script>
</body>
</html>
