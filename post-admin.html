<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Post Editor</title>
    <style>
        :root { --primary: #e67e22; --bg: #050505; --card: #121212; --border: #222; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        label { display: block; font-size: 11px; color: #888; margin: 15px 0 5px 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, textarea, select { 
            width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid var(--border); 
            color: white; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px;
        }
        input:focus, textarea:focus { border-color: var(--primary); background: #1f1f1f; }

        /* 媒体工具栏 */
        .media-tools { 
            display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
            background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
        }
        .tool-btn { 
            background: #252525; border: 1px solid #333; color: #eee; 
            padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .tool-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }

        .submit-btn { 
            background: var(--primary); color: white; border: none; padding: 16px; 
            border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; 
            margin-top: 25px; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 15px rgba(230,126,34,0.3);
        }
        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        #status { margin-top: 20px; text-align: center; font-weight: bold; font-size: 14px; min-height: 1.2em; }
        
        .tip { font-size: 11px; color: #555; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2><span>📝</span> Pengurus Blog BDP</h2>
    
    <label>GitHub Access Token (PAT)</label>
    <input type="password" id="secretToken" placeholder="Masukkan token akses anda...">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
            <label>Tajuk Artikel</label>
            <input type="text" id="postTitle" placeholder="Tajuk utama post...">
        </div>
        <div>
            <label>Destinasi (Label)</label>
            <select id="postLabel">
                <option value="post">Blog (Label: post)</option>
                <option value="poster">Poster (Label: poster)</option>
            </select>
        </div>
    </div>

    <label>Alatan Multimedia</label>
    <div class="media-tools">
        <button class="tool-btn" onclick="insertMedia('img')">🖼️ Gambar</button>
        <button class="tool-btn" onclick="insertMedia('vid')">🎥 Video</button>
        <button class="tool-btn" onclick="insertMedia('aud')">🎵 Audio</button>
        <button class="tool-btn" onclick="insertMedia('link')">🔗 Pautan</button>
    </div>
    
    <textarea id="postBody" rows="12" placeholder="Tulis kandungan artikel dalam Markdown atau HTML..."></textarea>
    
    <p class="tip">Tip: Gunakan pautan (URL) yang sah untuk media. Video dan Audio akan dimainkan terus dalam blog.</p>

    <button class="submit-btn" onclick="publishIssue()">Terbitkan Sekarang</button>
    <div id="status"></div>
</div>

<script>
    // 插入媒体代码
    function insertMedia(type) {
        const body = document.getElementById('postBody');
        const url = prompt(`Masukkan URL untuk ${type}:`);
        if (!url) return;

        let snippet = "";
        switch(type) {
            case 'img': snippet = `![Keterangan Gambar](${url})`; break;
            case 'vid': snippet = `\n<video controls style="width:100%; border-radius:12px; margin:15px 0;">\n  <source src="${url}" type="video/mp4">\n  Browser anda tidak menyokong video.\n</video>\n`; break;
            case 'aud': snippet = `\n<audio controls style="width:100%; margin:15px 0;" src="${url}"></audio>\n`; break;
            case 'link': snippet = `[Nama Pautan](${url})`; break;
        }
        
        const start = body.selectionStart;
        const end = body.selectionEnd;
        body.value = body.value.substring(0, start) + snippet + body.value.substring(end);
        body.focus();
    }

    async function publishIssue() {
        const token = document.getElementById('secretToken').value;
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postBody').value;
        const label = document.getElementById('postLabel').value;
        const status = document.getElementById('status');

        if (!token || !title || !content) {
            alert("Maaf, sila lengkapkan tajuk dan kandungan!");
            return;
        }

        status.innerText = "⏳ Sedang menghantar ke GitHub...";
        status.style.color = "#e67e22";

        try {
            const response = await fetch(`https://api.github.com/repos/bdpsemsira/bdpsemsira.github.io/issues`, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    title: title,
                    body: content,
                    labels: [label]
                })
            });

            if (response.ok) {
                status.innerText = "✅ BERJAYA! Artikel telah dipaparkan.";
                status.style.color = "#2ecc71";
                document.getElementById('postTitle').value = '';
                document.getElementById('postBody').value = '';
            } else {
                const data = await response.json();
                status.innerText = "❌ GAGAL: " + (data.message || "Ralat tidak diketahui");
                status.style.color = "#e74c3c";
            }
        } catch (e) {
            status.innerText = "❌ Ralat Rangkaian. Sila cuba lagi.";
            status.style.color = "#e74c3c";
        }
    }
</script>
</body>
</html>
