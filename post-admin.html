<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Post Editor</title>
    <style>
        :root { --primary: #e67e22; --bg: #050505; --card: #121212; --border: #222; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); margin-top: 0; }
        label { display: block; font-size: 11px; color: #888; margin: 15px 0 5px 5px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); }
        .media-tools { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
        .tool-btn { background: #252525; border: 1px solid #333; color: #eee; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .tool-btn:hover { background: var(--primary); color: white; }
        .submit-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 25px; font-size: 16px; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>📝 Pengurus Blog BDP</h2>
    
    <label>GitHub Access Token (Simpanan Pelayar)</label>
    <input type="password" id="secretToken" placeholder="Masukkan Token sekali sahaja, pelayar akan ingat...">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
            <label>Tajuk Artikel</label>
            <input type="text" id="postTitle" placeholder="Tajuk utama...">
        </div>
        <div>
            <label>Kategori (Label)</label>
            <select id="postLabel">
                <option value="post">Blog (post)</option>
                <option value="poster">Poster (poster)</option>
            </select>
        </div>
    </div>

    <label>Alatan Multimedia</label>
    <div class="media-tools">
        <button class="tool-btn" onclick="insertMedia('img')">🖼️ Gambar</button>
        <button class="tool-btn" onclick="insertMedia('vid')">🎥 Video</button>
        <button class="tool-btn" onclick="insertMedia('aud')">🎵 Audio</button>
    </div>
    
    <textarea id="postBody" rows="12" placeholder="Tulis di sini..."></textarea>
    
    <button class="submit-btn" onclick="publishPost()">Terbitkan Sekarang</button>
    <div id="status"></div>
</div>

<script>
    // --- 记忆功能：页面加载时自动读取 ---
    window.onload = () => {
        const savedToken = localStorage.getItem('bdp_github_token');
        if (savedToken) {
            document.getElementById('secretToken').value = savedToken;
        }
    };

    function insertMedia(type) {
        const body = document.getElementById('postBody');
        const url = prompt(`Masukkan URL ${type}:`);
        if (!url) return;
        let snippet = "";
        if(type==='img') snippet = `![Imej](${url})`;
        if(type==='vid') snippet = `\n<video controls style="width:100%; border-radius:12px;"><source src="${url}"></video>\n`;
        if(type==='aud') snippet = `\n<audio controls style="width:100%;" src="${url}"></audio>\n`;
        body.setRangeText(snippet, body.selectionStart, body.selectionEnd, 'end');
    }

    async function publishPost() {
        const token = document.getElementById('secretToken').value;
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postBody').value;
        const label = document.getElementById('postLabel').value;
        const status = document.getElementById('status');

        if (!token || !title || !content) {
            alert("Sila isi semua info!");
            return;
        }

        // --- 记忆功能：点击发布时自动保存 ---
        localStorage.setItem('bdp_github_token', token);

        status.innerText = "⏳ Sedang menghantar...";
        status.style.color = "#e67e22";

        try {
            const response = await fetch(`https://api.github.com/repos/bdpsemsira/bdpsemsira.github.io/issues`, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({ title: title, body: content, labels: [label] })
            });

            if (response.ok) {
                status.innerText = "✅ BERJAYA! Artikel telah terbit.";
                status.style.color = "#2ecc71";
                document.getElementById('postTitle').value = '';
                document.getElementById('postBody').value = '';
            } else {
                status.innerText = "❌ GAGAL: Token mungkin salah.";
                status.style.color = "#e74c3c";
            }
        } catch (e) {
            status.innerText = "❌ Ralat Rangkaian.";
        }
    }
</script>
</body>
</html>
