<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STPM & MUET Countdown · Semsira</title>
    <!-- Favicon & logo from semsira.png -->
    <link rel="icon" href="semsira.png" type="image/png">
    <link rel="apple-touch-icon" href="semsira.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9edf5 100%);
            min-height: 100vh;
            padding: 2rem 1rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            padding: 0.6rem 2rem 0.6rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0, 20, 40, 0.08);
            flex-wrap: wrap;
            justify-content: center;
        }
        .logo-wrapper img {
            height: 52px;
            width: 52px;
            object-fit: contain;
            border-radius: 12px;
            background: white;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo-wrapper h1 {
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            color: #0b2545;
        }
        .logo-wrapper h1 small {
            font-weight: 400;
            font-size: 1rem;
            color: #2c4a7a;
            margin-left: 6px;
        }
        .subhead {
            font-size: 1.15rem;
            color: #1f3a60;
            background: rgba(255,255,255,0.5);
            padding: 0.3rem 2rem;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            margin-bottom: 2.5rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.7);
            text-align: center;
        }
        /* section containers */
        .section-wrapper {
            width: 100%;
            max-width: 1500px;
            margin-bottom: 2rem;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #113155;
            margin: 1.8rem 0 1.2rem 0;
            padding-bottom: 0.3rem;
            border-bottom: 3px solid #b6cef0;
            display: inline-block;
            letter-spacing: -0.3px;
        }
        .section-title small {
            font-weight: 400;
            font-size: 1rem;
            color: #3c5f89;
            margin-left: 10px;
        }
        .countdown-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.8rem;
            width: 100%;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(6px);
            background: #ffffffdd;
            border-radius: 28px;
            padding: 1.4rem 1.2rem 1.8rem;
            min-width: 180px;
            flex: 1 0 180px;
            max-width: 240px;
            box-shadow: 0 12px 28px rgba(0, 20, 40, 0.10), 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .card:hover {
            transform: translateY(-6px);
            background: #ffffff;
            box-shadow: 0 20px 36px rgba(0, 30, 60, 0.16);
        }
        .card .exam-label {
            font-weight: 700;
            font-size: 1.2rem;
            color: #0a1e3c;
            letter-spacing: -0.3px;
            margin-bottom: 0.15rem;
            line-height: 1.3;
        }
        .card .exam-sub {
            font-size: 0.8rem;
            font-weight: 600;
            color: #2f4b77;
            background: rgba(60, 100, 180, 0.08);
            padding: 0.15rem 1rem;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }
        .card .date-badge {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1b3a6b;
            background: #eef3fc;
            padding: 0.15rem 1.2rem;
            border-radius: 40px;
            margin-bottom: 0.7rem;
            border: 1px solid #d6e2f5;
        }
        .countdown-number {
            font-size: 2.8rem;
            font-weight: 700;
            color: #0b2d5a;
            line-height: 1.1;
            letter-spacing: 1px;
            background: rgba(0, 40, 80, 0.02);
            padding: 0.1rem 0.2rem;
            border-radius: 20px;
        }
        .countdown-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #3e5f88;
            font-weight: 500;
            margin-top: 0.1rem;
        }
        .past-badge {
            background: #bcc9e0;
            color: #1f3760;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            opacity: 0.8;
        }
        .today-badge {
            color: #b45309;
            font-weight: 700;
            font-size: 1.4rem;
            background: #ffedd5;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
        }
        .two-col {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem 3rem;
            margin-bottom: 0.5rem;
        }
        .col {
            flex: 1 1 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .col .countdown-grid {
            gap: 1.5rem;
        }
        .col .card {
            max-width: 260px;
            width: 100%;
        }
        .footer {
            margin-top: 2.5rem;
            color: #2d4a73;
            font-weight: 400;
            background: rgba(255,255,255,0.5);
            padding: 0.5rem 2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .footer span {
            font-weight: 500;
            color: #0b2a4a;
        }
        @media (max-width: 650px) {
            .logo-wrapper h1 {
                font-size: 1.5rem;
            }
            .card {
                min-width: 150px;
                flex: 1 0 150px;
                padding: 1rem 0.8rem;
            }
            .countdown-number {
                font-size: 2.2rem;
            }
            .section-title {
                font-size: 1.5rem;
            }
        }
        @media (max-width: 480px) {
            .card {
                max-width: 100%;
                flex: 1 0 100%;
            }
            .col .card {
                max-width: 100%;
            }
        }
        .muet-badge {
            background: #d9e6f7;
            color: #1a3c6b;
        }
    </style>
</head>
<body>
    <!-- Logo & Brand -->
    <div class="logo-wrapper">
        <img src="semsira.png" alt="Semsira logo" width="52" height="52">
        <h1>Semsira <small>countdown</small></h1>
    </div>
    <div class="subhead">STPM SEM 3 · MUET SESI 3 · Ulangan (U1 & U2)</div>

    <div class="section-wrapper">
        <!-- ===== MUET SESI 3 ===== -->
        <h2 class="section-title">🎤 MUET SESI 3 <small>Speaking · Reading, Writing, Listening</small></h2>
        <div class="countdown-grid" id="muet-container">
            <!-- injected by JS -->
        </div>

        <!-- ===== STPM SEM 3 ===== -->
        <h2 class="section-title" style="margin-top: 2.2rem;">📘 STPM SEM 3</h2>
        <div class="countdown-grid" id="stpm-sem3-container">
            <!-- injected -->
        </div>

        <!-- ===== Ulangan SEM 1 & SEM 2 ===== -->
        <h2 class="section-title" style="margin-top: 2.2rem;">🔄 Ulangan (U1 & U2)</h2>
        <div class="two-col">
            <div class="col">
                <h3 style="color:#1f3f6b; margin-bottom: 0.8rem; font-weight: 500; border-bottom: 2px dashed #b6cef0; padding-bottom: 0.3rem;">SEM 1 Ulangan (U1)</h3>
                <div id="ulangan-sem1-container" style="display:flex; flex-wrap:wrap; justify-content:center; gap:1.5rem; width:100%;">
                    <!-- injected -->
                </div>
            </div>
            <div class="col">
                <h3 style="color:#1f3f6b; margin-bottom: 0.8rem; font-weight: 500; border-bottom: 2px dashed #b6cef0; padding-bottom: 0.3rem;">SEM 2 Ulangan (U2)</h3>
                <div id="ulangan-sem2-container" style="display:flex; flex-wrap:wrap; justify-content:center; gap:1.5rem; width:100%;">
                    <!-- injected -->
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        ⏳ <span>countdown</span> · Malaysia time (UTC+8) · 2026
    </div>

    <script>
        (function() {
            // ----- DATA -----
            // MUET SESI 3 (October)
            const muetExams = [
                { name: "MUET Speaking", subject: "SESI 3", date: "2026-10-10", extra: "Speaking" },
                { name: "MUET R/W/L", subject: "SESI 3", date: "2026-10-17", extra: "Reading · Writing · Listening" }
            ];

            // STPM SEM 3 (November)
            const stpmSem3 = [
                { name: "Pengajian Am 3", subject: "SEM 3", date: "2026-11-17", extra: "" },
                { name: "Bahasa Cina 3", subject: "SEM 3", date: "2026-11-17", extra: "" },
                { name: "Biology 3", subject: "SEM 3", date: "2026-11-18", extra: "" },
                { name: "ICT 3", subject: "SEM 3", date: "2026-11-18", extra: "" },
                { name: "Mathematics 3", subject: "SEM 3", date: "2026-11-19", extra: "" },
                { name: "Chemistry 3", subject: "SEM 3", date: "2026-11-24", extra: "" },
                { name: "Physics 3", subject: "SEM 3", date: "2026-11-25", extra: "" }
            ];

            // Ulangan SEM 1 (U1) - November 30, Dec 1,2,3,7
            const ulanganSem1 = [
                { name: "Pengajian Am U1", subject: "U1", date: "2026-11-30", extra: "" },
                { name: "Bahasa Cina U1", subject: "U1", date: "2026-11-30", extra: "" },
                { name: "Biology U1", subject: "U1", date: "2026-12-01", extra: "" },
                { name: "ICT U1", subject: "U1", date: "2026-12-01", extra: "" },
                { name: "Mathematics U1", subject: "U1", date: "2026-12-02", extra: "" },
                { name: "Chemistry U1", subject: "U1", date: "2026-12-03", extra: "" },
                { name: "Physics U1", subject: "U1", date: "2026-12-07", extra: "" }
            ];

            // Ulangan SEM 2 (U2) - December 10,14,15,16,17
            const ulanganSem2 = [
                { name: "Pengajian Am U2", subject: "U2", date: "2026-12-10", extra: "" },
                { name: "Bahasa Cina U2", subject: "U2", date: "2026-12-10", extra: "" },
                { name: "Biology U2", subject: "U2", date: "2026-12-14", extra: "" },
                { name: "ICT U2", subject: "U2", date: "2026-12-14", extra: "" },
                { name: "Mathematics U2", subject: "U2", date: "2026-12-15", extra: "" },
                { name: "Chemistry U2", subject: "U2", date: "2026-12-16", extra: "" },
                { name: "Physics U2", subject: "U2", date: "2026-12-17", extra: "" }
            ];

            // ----- helpers -----
            function formatDate(dateStr) {
                const d = new Date(dateStr + 'T00:00:00+08:00');
                const day = String(d.getDate()).padStart(2, '0');
                const month = d.toLocaleString('en', { month: 'short' });
                const year = d.getFullYear();
                return `${day} ${month} ${year}`;
            }

            function getCountdown(dateStr) {
                const now = new Date();
                const target = new Date(dateStr + 'T00:00:00+08:00');
                const nowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const targetDate = new Date(target.getFullYear(), target.getMonth(), target.getDate());
                const diffTime = targetDate - nowDate;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            }

            // ----- create card -----
            function createCard(exam) {
                const card = document.createElement('div');
                card.className = 'card';

                const diff = getCountdown(exam.date);
                let countdownHtml = '';

                if (diff < 0) {
                    countdownHtml = `<div class="past-badge">✅ passed</div>`;
                } else if (diff === 0) {
                    countdownHtml = `<div class="today-badge">today!</div>`;
                } else {
                    countdownHtml = `
                        <div class="countdown-number">${diff}</div>
                        <div class="countdown-label">day${diff > 1 ? 's' : ''}</div>
                    `;
                }

                const dateDisplay = formatDate(exam.date);
                const extraInfo = exam.extra ? `<div style="font-size:0.75rem; color:#3b5f8a; margin-top:4px; font-weight:500;">${exam.extra}</div>` : '';

                card.innerHTML = `
                    <div class="exam-label">${exam.name}</div>
                    <div class="exam-sub">${exam.subject}</div>
                    <div class="date-badge">📅 ${dateDisplay}</div>
                    ${countdownHtml}
                    ${extraInfo}
                `;
                return card;
            }

            // ----- render to container (with sorting) -----
            function renderExams(containerId, examArray) {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = '';
                const sorted = [...examArray].sort((a, b) => new Date(a.date) - new Date(b.date));
                sorted.forEach(exam => {
                    container.appendChild(createCard(exam));
                });
            }

            // render all sections
            renderExams('muet-container', muetExams);
            renderExams('stpm-sem3-container', stpmSem3);
            renderExams('ulangan-sem1-container', ulanganSem1);
            renderExams('ulangan-sem2-container', ulanganSem2);

            // footer date
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-MY', { day: 'numeric', month: 'long', year: 'numeric' });
            const footer = document.querySelector('.footer');
            if (footer) {
                footer.innerHTML = `⏳ <span>countdown</span> · Malaysia time (UTC+8) · ${dateStr}`;
            }
        })();
    </script>
</body>
</html>
