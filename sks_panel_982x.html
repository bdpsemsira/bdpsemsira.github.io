<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengurusan Pelajar | SEMSIRA BDP</title>
    <link rel="icon" type="image/png" href="semsira.png">
    <style>
        :root {
            --accent: #f1c40f; 
            --bg: #0a0a0a;
            --card: #181818;
            --text: #ffffff;
            --tag-late: #f1c40f;
            --tag-skip: #e67e22;
            --tag-bad: #e74c3c;
            --tag-other: #3498db;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .navbar { background: #000; padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #222; }
        .nav-brand { display: flex; align-items: center; }
        .nav-brand img { height: 45px; width: auto; margin-right: 15px; }
        .nav-brand h1 { font-size: 18px; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; padding-bottom: 80px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #222; }
        
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; align-items: flex-end; }
        input, select { background: #0f0f0f; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; flex: 1; outline: none; min-width: 120px; }
        
        .log-panel { 
            background: #050505; border: 1px solid #222; border-radius: 12px; 
            height: 150px; overflow-y: auto; padding: 15px; font-family: 'Courier New', monospace; font-size: 11px; 
        }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .log-msg { color: #bbb; flex: 1; margin: 0 15px; }
        .log-admin { color: var(--accent); font-weight: bold; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; table-layout: fixed; }
        th { color: #666; padding: 10px; text-align: left; font-size: 11px; text-transform: uppercase; }
        td { background: #1a1a1a; padding: 15px; border-top: 1px solid #282828; border-bottom: 1px solid #282828; word-wrap: break-word; }
        .highlight-row td { background: #2c0a0a !important; border-color: #5a1010 !important; }

        .offence-tag { display: inline-block; padding: 4px 8px; margin: 3px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; border-left: 3px solid #555; background: #222; }
        .tag-late { border-left-color: var(--tag-late); color: var(--tag-late); }
        .tag-skip { border-left-color: var(--tag-skip); color: var(--tag-skip); }
        .tag-bad { border-left-color: var(--tag-bad); color: var(--tag-bad); }
        .tag-other { border-left-color: var(--tag-other); color: var(--tag-other); }

        .count-badge { color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        button { background: var(--accent); color: black; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .delete-btn { background: #221111; color: #ff4d4d; border: 1px solid #442222; font-size: 9px; padding: 5px 10px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .stat-card { background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--accent); display: block; }
        .stat-lbl { font-size: 9px; color: #777; text-transform: uppercase; }

        .modal { display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;}
        .modal-content { background:#181818; padding:20px; border-radius:12px; width:400px; border:1px solid #333; }
        .history-item { display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #333; font-size:12px; }

        .sebab-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        .sebab-btn { background: #222; color: #fff; text-align: left; padding: 12px; border: 1px solid #333; border-radius: 8px; font-size: 13px; cursor: pointer; }

        /* PRINT CONFIGURATION */
        @media print {
            /* 关键点：设置 margin: 0 隐藏默认页眉页脚 */
            @page { size: A4; margin: 0; }
            body { background: white !important; color: black !important; margin: 0; -webkit-print-color-adjust: exact; }
            
            body * { visibility: hidden; }
            #printContainer, #printContainer * { visibility: visible; }
            
            #printContainer { 
                position: absolute; left: 0; top: 0; width: 100%; 
                display: block !important; background: white; 
                padding: 10mm; box-sizing: border-box;
            }
            .no-print { display: none !important; }
            
            /* 每页容器 */
            .print-page { 
                height: 285mm; /* 留一点缓冲距离 */
                break-after: page; 
                position: relative;
                display: flex;
                flex-direction: column;
            }

            .print-header-content { 
                display: flex; align-items: center; 
                border-bottom: 3px solid black; 
                padding-bottom: 10px; margin-bottom: 15px; 
            }

            .print-summary-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                margin-top: 20px;
            }
            .summary-box { border: 2px solid black; padding: 20px; text-align: center; }
            .summary-box h2 { font-size: 40px; margin: 5px 0; }

            table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 5px; }
            th, td { 
                border: 1px solid black !important; 
                padding: 8px !important; 
                color: black !important; 
                word-wrap: break-word; 
                font-size: 10px;
            }
            th { background: #f2f2f2 !important; }

            /* 签名框置于每页底部 */
            .print-footer-signature {
                margin-top: auto;
                padding-top: 20px;
                display: flex;
                justify-content: flex-end;
                width: 100%;
            }
        }

        #printContainer { display: none; }
    </style>
</head>
<body>

<div class="navbar no-print">
    <div class="nav-brand"><img src="semsira.png" alt="Logo"><h1>SEMSIRA BDP</h1></div>
    <div style="text-align:right">
        <div style="font-size:11px; color:#666">OPERATOR: <span id="displayAdmin" style="color:var(--accent)">...</span></div>
        <div style="font-size:11px; color:#27ae60">SISTEM AKTIF (2026)</div>
    </div>
</div>

<div class="container no-print">
    <div class="card">
        <h3>1. REKOD KEMASUKAN BARU</h3>
        <div class="input-group">
            <div style="flex:0.8"><label style="font-size:10px; color:var(--accent)">TARIKH</label><input type="date" id="keyinDate"></div>
            <div style="flex:0.6"><label style="font-size:10px; color:var(--accent)">PILIH KELAS</label><select id="selClass"><option value="">Memuatkan...</option></select><input type="text" id="stuClass" style="display:none; margin-top:5px;"></div>
            <div style="flex:1.2"><label style="font-size:10px; color:var(--accent)">NAMA PELAJAR</label><select id="selName"><option value="">Pilih Kelas...</option></select><input type="text" id="stuName" style="display:none; margin-top:5px;"></div>
            <div style="flex:0.4"><label style="font-size:10px; color:var(--accent)">MASA</label><input type="time" id="violationTime"></div>
            <div style="flex:1"><label style="font-size:10px; color:var(--accent)">KESALAHAN</label><select id="violation"><option value="" disabled selected>Pilih...</option><option value="Lewat">Lewat</option><option value="Ponteng Kelas">Ponteng Kelas</option><option value="Buli">Buli</option><option value="Bergaduh">Bergaduh</option><option value="Diskriminasi">Diskriminasi</option><option value="Barang Larangan">Barang Larangan</option><option value="Salah Guna Dadah/Merokok">Salah Guna Dadah/Merokok</option><option value="Isu Trafik">Isu Trafik</option><option value="Lain-lain">Lain-lain</option></select></div>
            <button id="btnSubmit">SIMPAN</button>
        </div>
        <small style="color:#555; cursor:pointer" id="manualToggle">* Input manual</small>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>2. ANALISIS KESALAHAN BULANAN</h3>
            <input type="month" id="statsMonth" style="width:160px;">
            <button id="btnPrintMonthly" style="background:#2980b9; color:white; font-size:11px;">PRINT BULANAN</button>
        </div>
        <div class="stats-grid" id="statsDisplay"></div>
    </div>

    <div class="card">
        <h3>3. LOG AKTIVITI</h3>
        <div class="log-panel" id="logDisplay">Memuatkan...</div>
    </div>

    <div class="card" style="background:transparent; border:none; padding:0;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>4. SENARAI DISIPLIN</h3>
            <div style="display:flex; gap:10px;">
                <select id="sortType" style="width:150px; font-size:11px;">
                    <option value="name">Susun: A-Z</option>
                    <option value="counts">Susun: Jumlah Kes</option>
                    <option value="dateNew">Susun: Tarikh (New)</option>
                </select>
                <button id="btnStudentReport" style="background:var(--tag-other); color:white; font-size:10px; display:none;">PRINT INDIVIDU</button>
            </div>
        </div>
        <input type="text" id="searchBox" placeholder="Cari nama...">
        <table>
            <thead><tr><th width="25%">Identiti</th><th width="45%">Kesalahan</th><th width="15%">Jumlah</th><th width="15%">Aksi</th></tr></thead>
            <tbody id="recordBody"></tbody>
        </table>
    </div>

    <div style="display:flex; justify-content:flex-end; gap:10px; align-items:center; margin-top:30px;">
        <input type="date" id="reportDate" style="width:150px;">
        <button id="btnPrintDaily" style="background:#27ae60; color:white;">PRINT HARIAN</button>
        <button id="btnMasterReset" style="background:#440000; color:#ff4d4d;">RESET TAHUNAN</button>
    </div>
</div>

<div id="printContainer"></div>

<div id="sebabModal" class="modal"><div class="modal-content"><h4 style="color:var(--accent)">SILA PILIH SEBAB LEWAT</h4><div class="sebab-grid" id="sebabButtons"></div><button id="btnCancelSebab" style="width:100%; margin-top:15px;">BATAL</button></div></div>
<div id="historyModal" class="modal"><div class="modal-content"><h4 id="modalTitle" style="color:var(--accent)">Sejarah</h4><div id="historyList"></div><button onclick="document.getElementById('historyModal').style.display='none'" style="width:100%; margin-top:15px;">TUTUP</button></div></div>

<script type="module">
    // Firebase & Global Init (与您之前的一致)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, where, getDocs, increment, orderBy, limit, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        databaseURL: "https://bdpsemsira-5c274-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    const colRef = collection(db, "students");
    const logRef = collection(db, "logs");

    let allData = [];
    let rtdbData = {};
    const currentAdmin = (sessionStorage.getItem('admin_name') || "ADMIN").split('@')[0].toUpperCase();

    // 初始化表单和逻辑
    document.getElementById('displayAdmin').innerText = currentAdmin;
    document.getElementById('keyinDate').valueAsDate = new Date();
    document.getElementById('statsMonth').value = new Date().toISOString().slice(0, 7);
    document.getElementById('violationTime').value = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});

    // 辅助函数：解析时间
    const parseTime = (str) => {
        try {
            const [dStr, tStr] = str.split(', ');
            const [d, m, y] = dStr.split('/');
            const [hh, mm] = tStr.split(':');
            return new Date(y, m-1, d, hh, mm).getTime();
        } catch(e) { return 0; }
    };

    // Firebase 实时监听
    onValue(ref(rtdb, "/"), snap => {
        rtdbData = snap.val() || {};
        const selClass = document.getElementById('selClass');
        let html = '<option value="">Pilih...</option>';
        Object.keys(rtdbData).sort().forEach(c => html += `<option value="${c}">${c}</option>`);
        html += '<option value="MANUAL">-- MANUAL --</option>';
        selClass.innerHTML = html;
    });

    document.getElementById('selClass').onchange = (e) => {
        const val = e.target.value;
        const selName = document.getElementById('selName');
        const stuClass = document.getElementById('stuClass');
        if(val === "MANUAL") { stuClass.style.display='block'; selName.innerHTML='<option value="MANUAL">-- MANUAL --</option>'; document.getElementById('stuName').style.display='block'; }
        else { stuClass.style.display='none'; stuClass.value=val; const students=rtdbData[val]||[]; let h='<option value="">Pilih...</option>'; students.sort().forEach(n => h+=`<option value="${n}">${n}</option>`); h+='<option value="MANUAL">-- BARU --</option>'; selName.innerHTML=h; }
    };
    document.getElementById('selName').onchange = (e) => { document.getElementById('stuName').style.display = (e.target.value==="MANUAL")?'block':'none'; if(e.target.value!=="MANUAL") document.getElementById('stuName').value=e.target.value; };

    onSnapshot(colRef, (snap) => { allData = snap.docs.map(d => ({ id: d.id, ...d.data() })); render(); updateStats(); });

    // 核心打印逻辑优化：自动分页
    const doPrint = (title, records) => {
        const printContainer = document.getElementById('printContainer');
        printContainer.innerHTML = ""; // 清空

        // 每页显示的名单行数
        const ITEMS_PER_PAGE = 25; 
        const pagesCount = Math.ceil(records.length / ITEMS_PER_PAGE) || 1;

        // 生成统计摘要页（第一页）
        const stats = {};
        records.forEach(r => { const base = r.type.split(' (')[0]; stats[base] = (stats[base] || 0) + 1; });
        const types = ["Lewat", "Ponteng Kelas", "Buli", "Bergaduh", "Barang Larangan", "Salah Guna Dadah/Merokok", "Isu Trafik", "Lain-lain"];

        let summaryHtml = `<div class="print-page">
            <div class="print-header-content">
                <img src="semsira.png" style="height:70px; margin-right:20px;">
                <div style="text-align:center; flex:1"><h1 style="margin:0;">RINGKASAN KESALAHAN</h1><p style="font-weight:bold;">${title}</p></div>
            </div>
            <div class="print-summary-grid">`;
        types.forEach(t => { if(stats[t]) summaryHtml += `<div class="summary-box"><p>${t.toUpperCase()}</p><h2>${stats[t]}</h2></div>`; });
        summaryHtml += `</div><div class="print-footer-signature">
                <div style="text-align:center;"><p style="margin-bottom:50px;">Disahkan Oleh:</p><p>_______________________</p><p>(Pegawai Bertugas)</p></div>
            </div></div>`;
        
        printContainer.innerHTML += summaryHtml;

        // 生成详细名单页
        for (let i = 0; i < pagesCount; i++) {
            const start = i * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const currentRecords = records.slice(start, end);

            let pageHtml = `<div class="print-page">
                <div class="print-header-content">
                    <img src="semsira.png" style="height:50px; margin-right:20px;">
                    <div style="text-align:center; flex:1"><h2 style="margin:0;">SENARAI TERPERINCI KESALAHAN</h2><p>${title} (Halaman ${i+1}/${pagesCount})</p></div>
                </div>
                <table>
                    <thead>
                        <tr><th width="25%">Nama</th><th width="25%">Kelas</th><th width="25%">Kesalahan</th><th width="10%">Masa</th><th width="15%">Admin</th></tr>
                    </thead>
                    <tbody>`;
            
            currentRecords.forEach(r => {
                pageHtml += `<tr><td>${r.name}</td><td>${r.class}</td><td>${r.type}</td><td>${r.time}</td><td>${r.by}</td></tr>`;
            });

            pageHtml += `</tbody></table>
                <div class="print-footer-signature">
                    <div style="text-align:center;"><p style="margin-bottom:50px;">Disahkan Oleh:</p><p>_______________________</p><p>(Pegawai Bertugas)</p></div>
                </div>
            </div>`;
            
            printContainer.innerHTML += pageHtml;
        }

        setTimeout(() => { window.print(); }, 500);
    };

    // 事件绑定与原有逻辑整合
    document.getElementById('btnPrintDaily').onclick = () => {
        const dInput = document.getElementById('reportDate').value;
        if(!dInput) return alert("Sila pilih tarikh!");
        const target = new Date(dInput).toLocaleDateString('en-GB');
        const res = [];
        allData.forEach(s => s.offences.forEach(o => { if(o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o }); }));
        if(res.length === 0) return alert("Tiada data.");
        doPrint(`LAPORAN HARIAN - ${target}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };

    document.getElementById('btnPrintMonthly').onclick = () => {
        const sel = document.getElementById('statsMonth').value;
        const [y, m] = sel.split('-');
        const target = `/${m}/${y}`;
        const res = [];
        allData.forEach(s => s.offences.forEach(o => { if(o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o }); }));
        doPrint(`LAPORAN BULANAN - ${m}/${y}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };

    // 其他原有函数（render, delStu, executeSubmit 等）请保持不变以确保 Firebase 正常运作...
    // 此处仅展示修改后的核心
    function render() {
        const search = document.getElementById('searchBox').value.toUpperCase();
        const sortBy = document.getElementById('sortType').value;
        let filtered = allData.filter(s => s.name.includes(search) || s.class.includes(search));
        filtered.sort((a, b) => (sortBy === 'name') ? a.name.localeCompare(b.name) : b.counts - a.counts);

        let h = "";
        filtered.forEach(s => {
            h += `<tr><td><b>${s.name}</b><br><small>${s.class}</small></td><td>${s.offences[0].type}...</td><td>${s.counts}</td><td><button class="delete-btn" onclick="window.delStu('${s.id}')">Padam</button></td></tr>`;
        });
        document.getElementById('recordBody').innerHTML = h;
    }

    const executeSubmit = async (name, cls, type, time) => {
        const kDate = new Date(document.getElementById('keyinDate').value).toLocaleDateString('en-GB');
        const fullTime = `${kDate}, ${time}`;
        const q = query(colRef, where("name","==",name.toUpperCase()), where("class","==",cls.toUpperCase()));
        const snap = await getDocs(q);
        if(!snap.empty) {
            const d = snap.docs[0];
            await updateDoc(doc(db, "students", d.id), { offences: [{type, time:fullTime, by:currentAdmin}, ...d.data().offences], counts: increment(1) });
        } else {
            await addDoc(colRef, { name: name.toUpperCase(), class: cls.toUpperCase(), offences: [{type, time:fullTime, by:currentAdmin}], counts: 1 });
        }
        location.reload();
    };

    document.getElementById('btnSubmit').onclick = () => {
        const n=document.getElementById('stuName').value;
        const c=document.getElementById('stuClass').value;
        const t=document.getElementById('violation').value;
        const m=document.getElementById('violationTime').value;
        if(n&&c&&t&&m) executeSubmit(n,c,t,m);
    };

    window.delStu = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db, "students", id)); };
    const updateStats = () => { /* 统计分析更新逻辑 */ };
</script>
</body>
</html>
