<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengurusan Pelajar | SEMSIRA BDP</title>
    <link rel="icon" type="image/png" href="semsira.png">
    <style>
        :root {
            --accent: #f1c40f; 
            --bg: #0a0a0a;
            --card: #181818;
            --text: #ffffff;
            --tag-late: #f1c40f;
            --tag-skip: #e67e22;
            --tag-bad: #e74c3c;
            --tag-other: #3498db;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .navbar { background: #000; padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #222; }
        .nav-brand { display: flex; align-items: center; }
        .nav-brand img { height: 45px; width: auto; margin-right: 15px; }
        .nav-brand h1 { font-size: 18px; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; padding-bottom: 80px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #222; }
        
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; align-items: flex-end; }
        input, select { background: #0f0f0f; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; flex: 1; outline: none; min-width: 120px; }
        
        .log-panel { 
            background: #050505; border: 1px solid #222; border-radius: 12px; 
            height: 150px; overflow-y: auto; padding: 15px; font-family: 'Courier New', monospace; font-size: 11px; 
        }
        .log-entry { padding: 4px 0; border-bottom: 1px solid #111; display: flex; justify-content: space-between; }
        .log-msg { color: #bbb; flex: 1; margin: 0 15px; }
        .log-admin { color: var(--accent); font-weight: bold; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; table-layout: fixed; }
        th { color: #666; padding: 10px; text-align: left; font-size: 11px; text-transform: uppercase; }
        td { background: #1a1a1a; padding: 15px; border-top: 1px solid #282828; border-bottom: 1px solid #282828; word-wrap: break-word; }
        .highlight-row td { background: #2c0a0a !important; border-color: #5a1010 !important; }

        .offence-tag { display: inline-block; padding: 4px 8px; margin: 3px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; border-left: 3px solid #555; background: #222; }
        .tag-late { border-left-color: var(--tag-late); color: var(--tag-late); }
        .tag-skip { border-left-color: var(--tag-skip); color: var(--tag-skip); }
        .tag-bad { border-left-color: var(--tag-bad); color: var(--tag-bad); }
        .tag-other { border-left-color: var(--tag-other); color: var(--tag-other); }

        .count-badge { color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        button { background: var(--accent); color: black; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .delete-btn { background: #221111; color: #ff4d4d; border: 1px solid #442222; font-size: 9px; padding: 5px 10px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .stat-card { background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--accent); display: block; }
        .stat-lbl { font-size: 9px; color: #777; text-transform: uppercase; }

        .modal { display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;}
        .modal-content { background:#181818; padding:20px; border-radius:12px; width:400px; border:1px solid #333; }
        .history-item { display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #333; font-size:12px; }

        .sebab-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        .sebab-btn { background: #222; color: #fff; text-align: left; padding: 12px; border: 1px solid #333; border-radius: 8px; font-size: 13px; cursor: pointer; }

        /* PRINT CONFIGURATION */
        @media print {
            /* 强制隐藏浏览器默认页眉页脚 (时间、网址、页码) */
            @page { 
                size: A4; 
                margin: 0; 
            }
            body { background: white !important; color: black !important; margin: 0; padding: 0; }
            body * { visibility: hidden; }
            #printContainer, #printContainer * { visibility: visible; }
            
            #printContainer { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
                display: block !important; 
                background: white; 
            }

            .no-print { display: none !important; }
            
            /* 分页容器样式：控制每一页的边距和内容 */
            .print-page-wrapper {
                width: 210mm;
                height: 297mm;
                padding: 15mm; /* 手动设置页面边距 */
                box-sizing: border-box;
                break-after: page;
                position: relative;
                overflow: hidden;
            }

            .print-summary-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                margin-top: 20px;
            }
            .summary-box { border: 2px solid black; padding: 15px; text-align: center; }
            .summary-box h2 { font-size: 35px; margin: 5px 0; }

            table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 10px; }
            th, td { 
                border: 1px solid black !important; 
                padding: 8px !important; 
                color: black !important; 
                word-wrap: break-word; 
                font-size: 11px;
                background: transparent !important;
            }

            .print-footer-content { 
                margin-top: 30px;
                display: flex; 
                justify-content: flex-end; 
                width: 100%; 
            }
        }

        #printContainer { display: none; }
        .print-header-content { display: flex; align-items: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="navbar no-print">
    <div class="nav-brand"><img src="semsira.png" alt="Logo"><h1>SEMSIRA BDP</h1></div>
    <div style="text-align:right">
        <div style="font-size:11px; color:#666">OPERATOR: <span id="displayAdmin" style="color:var(--accent)">...</span></div>
        <div style="font-size:11px; color:#27ae60">SISTEM AKTIF (2026)</div>
    </div>
</div>

<div class="container no-print">
    <div class="card">
        <h3>1. REKOD KEMASUKAN BARU</h3>
        <div class="input-group">
            <div style="flex:0.8">
                <label style="font-size:10px; color:var(--accent)">TARIKH</label>
                <input type="date" id="keyinDate">
            </div>
            <div style="flex:0.6">
                <label style="font-size:10px; color:var(--accent)">PILIH KELAS</label>
                <select id="selClass"><option value="">Memuatkan...</option></select>
                <input type="text" id="stuClass" placeholder="Manual Kelas" style="display:none; margin-top:5px;">
            </div>
            <div style="flex:1.2">
                <label style="font-size:10px; color:var(--accent)">NAMA PELAJAR</label>
                <select id="selName"><option value="">Pilih Kelas...</option></select>
                <input type="text" id="stuName" placeholder="Manual Nama" style="display:none; margin-top:5px;">
            </div>
            <div style="flex:0.4"><label style="font-size:10px; color:var(--accent)">MASA</label><input type="time" id="violationTime"></div>
            <div style="flex:1">
                <label style="font-size:10px; color:var(--accent)">KESALAHAN</label>
                <select id="violation">
                    <option value="" disabled selected>Pilih...</option>
                    <option value="Lewat">Lewat</option>
                    <option value="Ponteng Kelas">Ponteng Kelas</option>
                    <option value="Buli">Buli</option>
                    <option value="Bergaduh">Bergaduh</option>
                    <option value="Diskriminasi">Diskriminasi</option>
                    <option value="Barang Larangan">Barang Larangan</option>
                    <option value="Salah Guna Dadah/Merokok">Salah Guna Dadah/Merokok</option>
                    <option value="Isu Trafik">Isu Trafik</option>
                    <option value="Lain-lain">Lain-lain</option>
                </select>
            </div>
            <button id="btnSubmit">SIMPAN</button>
        </div>
        <small style="color:#555; cursor:pointer" id="manualToggle">* Input manual</small>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap:10px;">
            <h3>2. ANALISIS KESALAHAN BULANAN</h3>
            <div style="display:flex; gap:10px; align-items:center;">
                <input type="month" id="statsMonth" style="width:160px;">
                <button id="btnPrintMonthly" style="background:#2980b9; color:white; font-size:11px;">PRINT BULANAN</button>
            </div>
        </div>
        <div class="stats-grid" id="statsDisplay"></div>
    </div>

    <div class="card">
        <h3>3. LOG AKTIVITI</h3>
        <div class="log-panel" id="logDisplay">Memuatkan log...</div>
    </div>

    <div class="card" style="background:transparent; border:none; padding:0;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3>4. SENARAI DISIPLIN</h3>
            <div style="display:flex; gap:10px;">
                <select id="sortType" style="width:150px; font-size:11px;">
                    <option value="name">Susun: A-Z</option>
                    <option value="counts">Susun: Jumlah Kes (Banyak)</option>
                    <option value="dateNew">Susun: Tarikh (Terbaharu)</option>
                    <option value="dateOld">Susun: Tarikh (Terlama)</option>
                </select>
                <button id="btnStudentReport" style="background:var(--tag-other); color:white; font-size:10px; display:none;">PRINT REKOD INDIVIDU</button>
            </div>
        </div>
        <input type="text" id="searchBox" placeholder="Cari nama atau kelas...">
        <table>
            <thead>
                <tr>
                    <th width="25%">Identiti</th>
                    <th width="45%">Kesalahan (Klik Urus)</th>
                    <th width="15%" style="text-align:center">Jumlah</th>
                    <th width="15%">Aksi</th>
                </tr>
            </thead>
            <tbody id="recordBody"></tbody>
        </table>
    </div>

    <div style="display:flex; justify-content:flex-end; gap:10px; align-items:center; margin-top:30px;">
        <span style="font-size:11px; color:#555">FILTER TARIKH:</span>
        <input type="date" id="reportDate" style="width:150px;">
        <button id="btnPrintDaily" style="background:#27ae60; color:white;">PRINT HARIAN</button>
        <button id="btnMasterReset" style="background:#440000; color:#ff4d4d; border:1px solid #442222; font-size:10px;">RESET TAHUNAN</button>
    </div>
</div>

<div id="printContainer"></div>

<div id="sebabModal" class="modal"><div class="modal-content">
    <h4 style="margin-top:0; color:var(--accent)">SILA PILIH SEBAB LEWAT</h4>
    <div class="sebab-grid" id="sebabButtons"></div>
    <button id="btnCancelSebab" style="width:100%; margin-top:15px; background:#444; color:white;">BATAL</button>
</div></div>

<div id="historyModal" class="modal"><div class="modal-content">
    <h4 id="modalTitle" style="margin-top:0; color:var(--accent)">Sejarah</h4>
    <div id="historyList"></div>
    <button onclick="document.getElementById('historyModal').style.display='none'" style="width:100%; margin-top:15px; background:#444; color:white;">TUTUP</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, where, getDocs, increment, orderBy, limit, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        databaseURL: "https://bdpsemsira-5c274-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    const colRef = collection(db, "students");
    const logRef = collection(db, "logs");

    let allData = [];
    let rtdbData = {};
    let selectedStudent = null;
    const currentAdmin = (sessionStorage.getItem('admin_name') || "ADMIN").split('@')[0].toUpperCase();

    document.getElementById('displayAdmin').innerText = currentAdmin;
    document.getElementById('keyinDate').valueAsDate = new Date();
    document.getElementById('statsMonth').value = new Date().toISOString().slice(0, 7);
    document.getElementById('sortType').value = localStorage.getItem('bdp_sort') || 'name';
    document.getElementById('violationTime').value = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});

    const parseTime = (str) => {
        try {
            const [dStr, tStr] = str.split(', ');
            const [d, m, y] = dStr.split('/');
            const [hh, mm] = tStr.split(':');
            return new Date(y, m-1, d, hh, mm).getTime();
        } catch(e) { return 0; }
    };

    onValue(ref(rtdb, "/"), (snap) => {
        rtdbData = snap.val() || {};
        const selClass = document.getElementById('selClass');
        let html = '<option value="">Pilih...</option>';
        Object.keys(rtdbData).sort().forEach(c => html += `<option value="${c}">${c}</option>`);
        html += '<option value="MANUAL">-- MANUAL --</option>';
        selClass.innerHTML = html;
    });

    document.getElementById('selClass').onchange = (e) => {
        const val = e.target.value;
        const selName = document.getElementById('selName');
        const stuClass = document.getElementById('stuClass');
        if(val === "MANUAL") {
            stuClass.style.display = 'block';
            selName.innerHTML = '<option value="MANUAL">-- MANUAL --</option>';
            document.getElementById('stuName').style.display = 'block';
        } else {
            stuClass.style.display = 'none';
            stuClass.value = val;
            const students = rtdbData[val] || [];
            let html = '<option value="">Pilih Pelajar...</option>';
            students.sort().forEach(n => html += `<option value="${n}">${n}</option>`);
            html += '<option value="MANUAL">-- Pelajar Baru --</option>';
            selName.innerHTML = html;
        }
    };

    document.getElementById('selName').onchange = (e) => {
        const manual = e.target.value === "MANUAL";
        document.getElementById('stuName').style.display = manual ? 'block' : 'none';
        if(!manual) document.getElementById('stuName').value = e.target.value;
    };

    const executeSubmit = async (name, cls, type, time) => {
        const kDate = new Date(document.getElementById('keyinDate').value);
        const dateStr = kDate.toLocaleDateString('en-GB');
        const fullTime = `${dateStr}, ${time}`;
        const entry = { type, time: fullTime, by: currentAdmin };
        
        const q = query(colRef, where("name", "==", name.toUpperCase()), where("class", "==", cls.toUpperCase()));
        const snap = await getDocs(q);
        
        if(!snap.empty) {
            const d = snap.docs[0];
            await updateDoc(doc(db, "students", d.id), {
                offences: [entry, ...(d.data().offences || [])],
                counts: increment(1)
            });
        } else {
            await addDoc(colRef, { name: name.toUpperCase(), class: cls.toUpperCase(), offences: [entry], counts: 1 });
        }
        await addDoc(logRef, { msg: `TAMBAH: ${type} - ${name}`, admin: currentAdmin, timestamp: serverTimestamp() });
        alert("Berjaya Disimpan!");
        location.reload();
    };

    document.getElementById('btnSubmit').onclick = () => {
        const name = document.getElementById('stuName').value.trim();
        const cls = document.getElementById('stuClass').value.trim();
        const type = document.getElementById('violation').value;
        const time = document.getElementById('violationTime').value;
        if(!name || !cls || !type || !time) return alert("Sila lengkapkan!");
        if(type === "Lewat") {
            document.getElementById('sebabModal').style.display = 'flex';
        } else { executeSubmit(name, cls, type, time); }
    };

    const sebabList = ["Bangun Lewat", "Masalah Kenderaan", "Sakit Perut", "Masalah Trafik", "Masalah Keluarga"];
    document.getElementById('sebabButtons').innerHTML = sebabList.map(s => `<button class="sebab-btn">${s}</button>`).join('');
    document.querySelectorAll('.sebab-btn').forEach(btn => {
        btn.onclick = () => {
            const name = document.getElementById('stuName').value;
            const cls = document.getElementById('stuClass').value;
            const time = document.getElementById('violationTime').value;
            executeSubmit(name, cls, `Lewat (${btn.innerText})`, time);
        };
    });

    onSnapshot(colRef, (snap) => {
        allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
        updateStats();
    });

    onSnapshot(query(logRef, orderBy("timestamp", "desc"), limit(10)), (snap) => {
        let html = "";
        snap.forEach(d => {
            const data = d.data();
            const t = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "...";
            html += `<div class="log-entry"><span>[${t}]</span><span class="log-msg">${data.msg}</span><span class="log-admin">@${data.admin}</span></div>`;
        });
        document.getElementById('logDisplay').innerHTML = html;
    });

    function render() {
        const search = document.getElementById('searchBox').value.toUpperCase();
        const filterDateInput = document.getElementById('reportDate').value;
        const targetDate = filterDateInput ? new Date(filterDateInput).toLocaleDateString('en-GB') : null;
        const sortBy = document.getElementById('sortType').value;

        let filtered = allData.filter(s => s.name.includes(search) || s.class.includes(search));
        if(targetDate) filtered = filtered.filter(s => s.offences?.some(o => o.time.includes(targetDate)));

        filtered.sort((a, b) => {
            if(sortBy === 'name') return a.name.localeCompare(b.name);
            if(sortBy === 'counts') return b.counts - a.counts;
            const timeA = a.offences ? parseTime(a.offences[0].time) : 0;
            const timeB = b.offences ? parseTime(b.offences[0].time) : 0;
            return sortBy === 'dateNew' ? timeB - timeA : timeA - timeB;
        });

        const btnRep = document.getElementById('btnStudentReport');
        if(search.length > 2 && filtered.length === 1) {
            selectedStudent = filtered[0];
            btnRep.style.display = 'block';
            btnRep.innerText = `PRINT REKOD: ${selectedStudent.name}`;
        } else { btnRep.style.display = 'none'; }

        let html = "";
        filtered.forEach(s => {
            const sortedOff = [...(s.offences || [])].sort((a,b) => parseTime(b.time) - parseTime(a.time));
            const grouped = sortedOff.reduce((acc, curr) => {
                const base = curr.type.split(' (')[0];
                acc[base] = (acc[base] || 0) + 1;
                return acc;
            }, {});

            let tags = "";
            for (const [type, count] of Object.entries(grouped)) {
                let cls = type === "Lewat" ? "tag-late" : (["Buli", "Bergaduh", "Diskriminasi"].includes(type) ? "tag-bad" : "tag-other");
                tags += `<span class="offence-tag ${cls}" onclick="window.openHist('${s.id}', '${type}')">${type} ${count>1?'x'+count:''}</span>`;
            }

            html += `<tr class="${s.counts >= 3 ? 'highlight-row' : ''}">
                <td style="word-wrap:break-word;"><b>${s.name}</b><br><small style="color:var(--accent)">${s.class}</small></td>
                <td>${tags}</td>
                <td style="text-align:center"><span class="count-badge">${s.counts}</span></td>
                <td><button class="delete-btn" onclick="window.delStu('${s.id}')">Hapus</button></td>
            </tr>`;
        });
        document.getElementById('recordBody').innerHTML = html;
    }

    window.openHist = (id, type) => {
        const s = allData.find(x => x.id === id);
        const list = s.offences.filter(o => o.type.startsWith(type)).sort((a,b) => parseTime(b.time) - parseTime(a.time));
        document.getElementById('modalTitle').innerText = type;
        document.getElementById('historyList').innerHTML = list.map(i => `
            <div class="history-item">
                <span>${i.time}<br><small>Oleh: ${i.by}</small></span>
                <button class="delete-btn" onclick="window.delOne('${id}', '${i.time}')">PADAM</button>
            </div>`).join('');
        document.getElementById('historyModal').style.display = 'flex';
    };

    window.delStu = async (id) => {
        const s = allData.find(x => x.id === id);
        if(confirm(`Hapus SEMUA rekod ${s.name}?`)) {
            await deleteDoc(doc(db, "students", id));
            await addDoc(logRef, { msg: `PADAM PELAJAR: ${s.name}`, admin: currentAdmin, timestamp: serverTimestamp() });
        }
    };

    window.delOne = async (id, time) => {
        const s = allData.find(x => x.id === id);
        const newArr = s.offences.filter(o => o.time !== time);
        if(newArr.length === 0) await deleteDoc(doc(db, "students", id));
        else await updateDoc(doc(db, "students", id), { offences: newArr, counts: newArr.length });
        await addDoc(logRef, { msg: `PADAM REKOD: ${s.name} (${time})`, admin: currentAdmin, timestamp: serverTimestamp() });
        document.getElementById('historyModal').style.display = 'none';
    };

    const updateStats = () => {
        const sel = document.getElementById('statsMonth').value;
        if(!sel) return;
        const [y, m] = sel.split('-');
        const target = `/${m}/${y}`;
        const stats = {};
        allData.forEach(s => s.offences?.forEach(o => {
            if(o.time.includes(target)) {
                const base = o.type.split(' (')[0];
                stats[base] = (stats[base] || 0) + 1;
            }
        }));
        const types = ["Lewat", "Ponteng Kelas", "Buli", "Bergaduh", "Barang Larangan", "Salah Guna Dadah/Merokok", "Isu Trafik"];
        document.getElementById('statsDisplay').innerHTML = types.map(t => `<div class="stat-card"><span class="stat-val">${stats[t]||0}</span><span class="stat-lbl">${t}</span></div>`).join('');
    };

    // --- 修改后的打印函数 ---
    const doPrint = (title, records) => {
        const container = document.getElementById('printContainer');
        container.innerHTML = ""; 

        // 1. 汇总页
        const stats = {};
        records.forEach(r => {
            const base = r.type.split(' (')[0];
            stats[base] = (stats[base] || 0) + 1;
        });
        const types = ["Lewat", "Ponteng Kelas", "Buli", "Bergaduh", "Barang Larangan", "Salah Guna Dadah/Merokok", "Isu Trafik", "Lain-lain"];
        let summaryBoxes = "";
        types.forEach(t => {
            if(stats[t]) summaryBoxes += `<div class="summary-box"><p>${t.toUpperCase()}</p><h2>${stats[t]}</h2></div>`;
        });

        container.innerHTML += `
            <div class="print-page-wrapper">
                <div class="print-header-content">
                    <img src="semsira.png" style="height:60px; margin-right:15px;">
                    <div style="flex:1">
                        <h1 style="margin:0; font-size:22px;">RINGKASAN KESALAHAN</h1>
                        <p style="margin:0; font-size:14px; font-weight:bold;">${title}</p>
                    </div>
                </div>
                <div class="print-summary-grid">${summaryBoxes}</div>
                <div class="print-footer-content">
                    <div style="text-align:center;">
                        <p style="margin-bottom:50px;">Disahkan Oleh:</p>
                        <p>___________________________</p>
                        <p style="font-weight:bold;">(Pegawai Bertugas)</p>
                    </div>
                </div>
            </div>`;

        // 2. 详情页 (每10条一组)
        const chunkSize = 10;
        for (let i = 0; i < records.length; i += chunkSize) {
            const chunk = records.slice(i, i + chunkSize);
            const rows = chunk.map(r => `
                <tr>
                    <td>${r.name}</td>
                    <td>${r.class}</td>
                    <td>${r.type}</td>
                    <td>${r.time}</td>
                    <td>${r.by}</td>
                </tr>`).join('');

            container.innerHTML += `
                <div class="print-page-wrapper">
                    <div class="print-header-content">
                        <img src="semsira.png" style="height:50px; margin-right:15px;">
                        <div style="flex:1">
                            <h1 style="margin:0; font-size:18px;">SENARAI TERPERINCI KESALAHAN</h1>
                            <p style="margin:0; font-size:12px;">${title} (${Math.floor(i/chunkSize) + 1})</p>
                        </div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th width="25%">Nama</th>
                                <th width="20%">Kelas</th>     
                                <th width="30%">Kesalahan</th>
                                <th width="15%">Masa/Tarikh</th>      
                                <th width="10%">Admin</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="print-footer-content">
                        <div style="text-align:center;">
                            <p style="margin-bottom:50px;">Disahkan Oleh:</p>
                            <p>___________________________</p>
                            <p style="font-weight:bold;">(Pegawai Bertugas)</p>
                        </div>
                    </div>
                </div>`;
        }

        window.print();
    };

    document.getElementById('btnPrintDaily').onclick = () => {
        const dInput = document.getElementById('reportDate').value;
        if(!dInput) return alert("Pilih tarikh!");
        const target = new Date(dInput).toLocaleDateString('en-GB');
        let res = [];
        allData.forEach(s => s.offences.forEach(o => {
            if(o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o });
        }));
        if(res.length === 0) return alert("Tiada data.");
        doPrint(`LAPORAN DISIPLIN HARIAN - ${target}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };

    document.getElementById('btnPrintMonthly').onclick = () => {
        const sel = document.getElementById('statsMonth').value;
        const [y, m] = sel.split('-');
        const target = `/${m}/${y}`;
        let res = [];
        allData.forEach(s => s.offences.forEach(o => {
            if(o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o });
        }));
        if(res.length === 0) return alert("Tiada data.");
        doPrint(`LAPORAN DISIPLIN BULANAN - ${m}/${y}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };

    document.getElementById('btnStudentReport').onclick = () => {
        if(!selectedStudent) return;
        doPrint(`REKOD DISIPLIN INDIVIDU: ${selectedStudent.name}`, selectedStudent.offences);
    };

    document.getElementById('searchBox').onkeyup = render;
    document.getElementById('reportDate').onchange = render;
    document.getElementById('sortType').onchange = (e) => {
        localStorage.setItem('bdp_sort', e.target.value);
        render();
    };
    document.getElementById('manualToggle').onclick = () => {
        document.getElementById('selClass').value = "MANUAL";
        document.getElementById('selClass').dispatchEvent(new Event('change'));
    };
    document.getElementById('btnCancelSebab').onclick = () => document.getElementById('sebabModal').style.display = 'none';
    document.getElementById('btnMasterReset').onclick = async () => {
        if(confirm("AWAS! Padam SEMUA data tahunan?") && prompt("Taip 'PADAM2026' untuk sahkan:") === "PADAM2026") {
            const qs = await getDocs(colRef);
            const batch = writeBatch(db);
            qs.forEach(d => batch.delete(d.ref));
            await batch.commit();
            alert("Data dikosongkan.");
            location.reload();
        }
    };
</script>
</body>
</html>
