<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pengurusan Pelajar · SEMSIRA BDP</title>
    <link rel="icon" type="image/png" href="semsira.png">
    <style>
        * {
            box-sizing: border-box;
        }
        :root {
            --accent: #f1c40f;
            --bg: #0a0a0a;
            --card: #181818;
            --text: #ffffff;
            --tag-late: #f1c40f;
            --tag-skip: #e67e22;
            --tag-bad: #e74c3c;
            --tag-other: #3498db;
            --radius: 14px;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            padding: 0 6px 80px 6px;
        }
        .navbar {
            background: #000;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #222;
            flex-wrap: wrap;
            gap: 8px;
            margin: 0 -6px;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-brand img {
            height: 38px;
            width: auto;
        }
        .nav-brand h1 {
            font-size: 16px;
            color: var(--accent);
            margin: 0;
            letter-spacing: 0.5px;
        }
        .nav-right {
            font-size: 11px;
            color: #666;
            text-align: right;
            line-height: 1.3;
        }
        .nav-right span {
            color: var(--accent);
        }
        .container {
            max-width: 1100px;
            margin: 16px auto 0;
            padding: 0 4px;
        }
        .card {
            background: var(--card);
            padding: 16px 14px;
            border-radius: var(--radius);
            margin-bottom: 18px;
            border: 1px solid #222;
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-end;
        }
        .input-row>div {
            flex: 1 0 140px;
            min-width: 120px;
        }
        .input-row label {
            font-size: 10px;
            color: var(--accent);
            display: block;
            margin-bottom: 3px;
            letter-spacing: 0.3px;
        }
        input, select {
            background: #0f0f0f;
            border: 1px solid #333;
            color: white;
            padding: 10px 10px;
            border-radius: 8px;
            width: 100%;
            outline: none;
            font-size: 14px;
            transition: 0.15s;
        }
        input:focus, select:focus {
            border-color: var(--accent);
        }
        .btn {
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 80px;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.96); }
        .btn-secondary { background: #2980b9; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #440000; color: #ff4d4d; border: 1px solid #442222; }
        .btn-sm { font-size: 11px; padding: 6px 12px; }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }
        .stat-card {
            background: #0a0a0a;
            padding: 12px 6px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: center;
        }
        .stat-val {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
            display: block;
        }
        .stat-lbl {
            font-size: 9px;
            color: #777;
            text-transform: uppercase;
        }
        .log-panel {
            background: #050505;
            border: 1px solid #222;
            border-radius: 12px;
            height: 130px;
            overflow-y: auto;
            padding: 10px 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .log-msg { color: #bbb; flex: 1; margin: 0 8px 0 0; }
        .log-admin { color: var(--accent); font-weight: bold; }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
            table-layout: fixed;
            font-size: 13px;
        }
        th {
            color: #666;
            padding: 6px 4px;
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
        }
        td {
            background: #1a1a1a;
            padding: 10px 8px;
            border-top: 1px solid #282828;
            border-bottom: 1px solid #282828;
            word-wrap: break-word;
        }
        .highlight-row td {
            background: #2c0a0a !important;
            border-color: #5a1010 !important;
        }
        .offence-tag {
            display: inline-block;
            padding: 3px 8px;
            margin: 2px 4px 2px 0;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            background: #222;
            border-left: 3px solid #555;
        }
        .tag-late { border-left-color: var(--tag-late); color: var(--tag-late); }
        .tag-skip { border-left-color: var(--tag-skip); color: var(--tag-skip); }
        .tag-bad { border-left-color: var(--tag-bad); color: var(--tag-bad); }
        .tag-other { border-left-color: var(--tag-other); color: var(--tag-other); }
        .count-badge {
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 2px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
        }
        .delete-btn {
            background: #221111;
            color: #ff4d4d;
            border: 1px solid #442222;
            font-size: 9px;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-content {
            background: #181818;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #333;
            max-height: 80vh;
            overflow-y: auto;
        }
        .sebab-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .sebab-btn {
            background: #222;
            color: #fff;
            text-align: left;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 12px;
            gap: 8px;
        }
        .search-box {
            margin-bottom: 8px;
        }
        .search-box input {
            padding: 10px;
            font-size: 14px;
        }
        .no-print { display: block; }
        #printContainer { display: none; }

        /* mobile tweaks */
        @media (max-width: 600px) {
            .navbar { padding: 10px 12px; }
            .nav-brand h1 { font-size: 14px; }
            .card { padding: 14px 10px; }
            .input-row>div { flex: 1 0 100%; }
            .btn { width: 100%; justify-content: center; }
            .flex-between { flex-direction: column; align-items: stretch; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .modal-content { padding: 16px; }
            .sebab-grid { grid-template-columns: 1fr; }
        }
        @media print {
            @page { margin: 0; }
            body { background: white !important; color: black !important; margin: 0; padding: 0; }
            body * { visibility: hidden; }
            #printContainer, #printContainer * { visibility: visible; }
            #printContainer { position: absolute; left: 0; top: 0; width: 100%; display: block !important; background: white; }
            .no-print { display: none !important; }
            .print-page-wrapper {
                width: 210mm;
                height: 297mm;
                padding: 15mm;
                box-sizing: border-box;
                break-after: page;
                position: relative;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .print-header-content {
                display: flex !important;
                align-items: center;
                border-bottom: 2px solid black;
                padding-bottom: 10px;
                margin-bottom: 15px;
                visibility: visible !important;
            }
            .print-header-content img {
                height: 50px !important;
                width: auto !important;
                margin-right: 15px !important;
                visibility: visible !important;
            }
            .print-summary-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                margin-top: 20px;
            }
            .summary-box { border: 2px solid black; padding: 15px; text-align: center; }
            .summary-box h2 { font-size: 32px; margin: 5px 0; }
            table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 10px; }
            th, td {
                border: 1px solid black !important;
                padding: 6px !important;
                color: black !important;
                word-wrap: break-word;
                font-size: 10px;
                background: transparent !important;
            }
            .print-footer-content {
                margin-top: 30px;
                display: flex;
                justify-content: flex-end;
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="navbar no-print">
    <div class="nav-brand"><img src="semsira.png" alt="Logo"><h1>SEMSIRA BDP</h1></div>
    <div class="nav-right">
        <div>OPERATOR: <span id="displayAdmin">...</span></div>
        <div style="color:#27ae60;">SISTEM AKTIF 2026</div>
    </div>
</div>

<div class="container no-print">
    <!-- 1. REKOD BARU -->
    <div class="card">
        <h3>1. REKOD KEMASUKAN</h3>
        <div class="input-group">
            <div class="input-row">
                <div><label>TARIKH</label><input type="date" id="keyinDate"></div>
                <div><label>KELAS</label>
                    <select id="selClass"><option>Memuatkan...</option></select>
                    <input type="text" id="stuClass" placeholder="Manual Kelas" style="display:none; margin-top:4px;">
                </div>
                <div><label>NAMA PELAJAR</label>
                    <select id="selName"><option value="">Pilih Kelas...</option></select>
                    <input type="text" id="stuName" placeholder="Manual Nama" style="display:none; margin-top:4px;">
                </div>
                <div><label>MASA</label><input type="time" id="violationTime"></div>
                <div style="flex:1.2;"><label>KESALAHAN</label>
                    <select id="violation">
                        <option value="" disabled selected>Pilih...</option>
                        <option value="Lewat">Lewat</option>
                        <option value="Ponteng Kelas">Ponteng Kelas</option>
                        <option value="Buli">Buli</option>
                        <option value="Bergaduh">Bergaduh</option>
                        <option value="Diskriminasi">Diskriminasi</option>
                        <option value="Barang Larangan">Barang Larangan</option>
                        <option value="Salah Guna Dadah/Merokok">Salah Guna Dadah/Merokok</option>
                        <option value="Isu Trafik">Isu Trafik</option>
                        <option value="Lain-lain">Lain-lain</option>
                    </select>
                </div>
                <div style="flex:0.6; display:flex; gap:6px; align-items:flex-end;">
                    <button class="btn" id="btnSubmit" style="flex:1;">SIMPAN</button>
                </div>
            </div>
            <small style="color:#555; cursor:pointer" id="manualToggle">* Input manual</small>
        </div>
    </div>

    <!-- 2. ANALISIS BULANAN + PREVIEW/PRINT -->
    <div class="card">
        <div class="flex-between">
            <h3 style="margin:0;">2. ANALISIS BULANAN</h3>
            <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                <input type="month" id="statsMonth" style="width:160px;">
                <button class="btn btn-secondary btn-sm" id="btnPreviewMonthly">PREVIEW</button>
                <button class="btn btn-secondary btn-sm" id="btnPrintMonthly" style="background:#2980b9; color:white;">PRINT</button>
            </div>
        </div>
        <div class="stats-grid" id="statsDisplay"></div>
    </div>

    <!-- 3. LOG -->
    <div class="card">
        <h3>3. LOG AKTIVITI</h3>
        <div class="log-panel" id="logDisplay">Memuatkan log...</div>
    </div>

    <!-- 4. SENARAI DISIPLIN + HARIAN PREVIEW/PRINT -->
    <div class="card" style="background:transparent; border:none; padding:0;">
        <div class="flex-between" style="margin-bottom:8px;">
            <h3 style="margin:0;">4. SENARAI DISIPLIN</h3>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <select id="sortType" style="width:130px; font-size:11px;">
                    <option value="name">Susun: A-Z</option>
                    <option value="counts">Jumlah Kes</option>
                    <option value="dateNew">Tarikh (Baru)</option>
                    <option value="dateOld">Tarikh (Lama)</option>
                </select>
                <button class="btn btn-sm" id="btnStudentReport" style="background:var(--tag-other); color:white; display:none;">PRINT INDIVIDU</button>
            </div>
        </div>
        <div class="search-box"><input type="text" id="searchBox" placeholder="Cari nama atau kelas..."></div>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th width="25%">Identiti</th><th width="45%">Kesalahan</th><th width="15%" style="text-align:center">Jumlah</th><th width="15%">Aksi</th></tr></thead>
                <tbody id="recordBody"></tbody>
            </table>
        </div>
    </div>

    <!-- FILTER HARIAN + PREVIEW/PRINT -->
    <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end; align-items:center; margin-top:12px;">
        <span style="font-size:11px; color:#555;">FILTER TARIKH:</span>
        <input type="date" id="reportDate" style="width:150px;">
        <button class="btn btn-success btn-sm" id="btnPreviewDaily">PREVIEW</button>
        <button class="btn btn-success btn-sm" id="btnPrintDaily">PRINT HARIAN</button>
        <button class="btn btn-danger btn-sm" id="btnMasterReset" style="background:#440000; color:#ff4d4d; border:1px solid #442222;">RESET TAHUNAN</button>
    </div>
</div>

<div id="printContainer"></div>

<!-- MODAL SEBAB -->
<div id="sebabModal" class="modal"><div class="modal-content">
    <h4 style="margin-top:0; color:var(--accent);">SILA PILIH SEBAB LEWAT</h4>
    <div class="sebab-grid" id="sebabButtons"></div>
    <button id="btnCancelSebab" style="width:100%; margin-top:12px; background:#444; color:white; border:none; padding:10px; border-radius:8px;">BATAL</button>
</div></div>

<!-- MODAL SEJARAH -->
<div id="historyModal" class="modal"><div class="modal-content">
    <h4 id="modalTitle" style="margin-top:0; color:var(--accent);">Sejarah</h4>
    <div id="historyList"></div>
    <button onclick="document.getElementById('historyModal').style.display='none'" style="width:100%; margin-top:12px; background:#444; color:white; border:none; padding:10px; border-radius:8px;">TUTUP</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, where, getDocs, increment, orderBy, limit, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        databaseURL: "https://bdpsemsira-5c274-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    const colRef = collection(db, "students");
    const logRef = collection(db, "logs");

    let allData = [];
    let rtdbData = {};
    let selectedStudent = null;
    const currentAdmin = (sessionStorage.getItem('admin_name') || "ADMIN").split('@')[0].toUpperCase();

    document.getElementById('displayAdmin').innerText = currentAdmin;
    document.getElementById('keyinDate').valueAsDate = new Date();
    document.getElementById('statsMonth').value = new Date().toISOString().slice(0, 7);
    document.getElementById('sortType').value = localStorage.getItem('bdp_sort') || 'name';
    document.getElementById('violationTime').value = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});

    const parseTime = (str) => {
        try {
            const [dStr, tStr] = str.split(', ');
            const [d, m, y] = dStr.split('/');
            const [hh, mm] = tStr.split(':');
            return new Date(y, m-1, d, hh, mm).getTime();
        } catch(e) { return 0; }
    };

    // Kelas tetap (semua mesti ada)
    const fixedClasses = [
        "6 SARAH", "6 SUMAYYAH", "6 KHADIJAH", "6 FATIMAH", "6 ZAINAB", 
        "6 AISHAH", "6 RUQAYYAH", "6 UMMU KALTOM", "6 AL FARABI", "6 AL GHAZALI",
        "6 AL KHINDI", "6 AL MAWARDI", "6 AL RAZI", "6 IBNU KHALDUN", "6 IBNU RUSYD", "6 IBNU SINA"
    ];

    // Populate RTDB + fixed classes
    onValue(ref(rtdb, "/"), (snap) => {
        rtdbData = snap.val() || {};
        const selClass = document.getElementById('selClass');
        let html = '<option value="">Pilih...</option>';
        // show all fixed classes first
        fixedClasses.forEach(c => html += `<option value="${c}">${c}</option>`);
        // also any extra from rtdb
        Object.keys(rtdbData).forEach(c => {
            if(!fixedClasses.includes(c)) html += `<option value="${c}">${c}</option>`;
        });
        html += '<option value="MANUAL">-- MANUAL --</option>';
        selClass.innerHTML = html;
    });

    // Class change -> populate names + autocomplete
    document.getElementById('selClass').onchange = (e) => {
        const val = e.target.value;
        const selName = document.getElementById('selName');
        const stuClass = document.getElementById('stuClass');
        const stuName = document.getElementById('stuName');
        if(val === "MANUAL") {
            stuClass.style.display = 'block';
            stuClass.value = '';
            selName.innerHTML = '<option value="MANUAL">-- MANUAL --</option>';
            stuName.style.display = 'block';
            stuName.value = '';
        } else {
            stuClass.style.display = 'none';
            stuClass.value = val;
            const students = rtdbData[val] || [];
            let html = '<option value="">Pilih Pelajar...</option>';
            students.sort().forEach(n => html += `<option value="${n}">${n}</option>`);
            html += '<option value="MANUAL">-- Pelajar Baru --</option>';
            selName.innerHTML = html;
            stuName.style.display = 'none';
            stuName.value = '';
        }
    };

    // Name select -> autocomplete manual input
    document.getElementById('selName').onchange = (e) => {
        const val = e.target.value;
        const stuName = document.getElementById('stuName');
        if(val === "MANUAL") {
            stuName.style.display = 'block';
            stuName.value = '';
        } else {
            stuName.style.display = 'none';
            stuName.value = val;
        }
    };

    // Autocomplete from RTDB while typing (manual input)
    document.getElementById('stuName').addEventListener('input', function(e) {
        const input = this.value.trim().toUpperCase();
        const selectedClass = document.getElementById('stuClass').value.trim();
        if(!selectedClass || input.length < 1) return;
        const list = rtdbData[selectedClass] || [];
        const match = list.find(n => n.toUpperCase().startsWith(input));
        if(match) {
            // show suggestion via datalist? we use a simple prompt style: set value
            // but we want to show a dropdown? we use a simple alert style: if match, we set
            // but better: use a temporary suggestion. we use a confirm-like approach
            // we use a quick inline: we'll show a small popup? we implement via a simple prompt
            // but we use a simple approach: set the value if user accepts
            if(confirm(`Cadangan: ${match}. Guna nama ini?`)) {
                this.value = match;
            }
        }
    });

    // --------------------- MERGE DUPLICATE RECORDS (same name+class, merge offences) ---------------------
    async function mergeDuplicates() {
        const snap = await getDocs(colRef);
        const map = new Map();
        const toDelete = [];
        const toUpdate = [];
        snap.forEach(docSnap => {
            const data = docSnap.data();
            const key = data.name + '|' + data.class;
            if(map.has(key)) {
                const existing = map.get(key);
                // merge offences
                const combined = [...existing.data.offences, ...data.offences];
                // remove duplicate time entries (same time)
                const unique = combined.filter((v,i,a) => a.findIndex(t => t.time === v.time) === i);
                toUpdate.push({ id: existing.id, offences: unique, counts: unique.length });
                toDelete.push(docSnap.id);
            } else {
                map.set(key, { id: docSnap.id, data: data });
            }
        });
        for(const item of toUpdate) {
            await updateDoc(doc(db, "students", item.id), { offences: item.offences, counts: item.counts });
        }
        for(const id of toDelete) {
            await deleteDoc(doc(db, "students", id));
        }
        if(toDelete.length > 0) {
            await addDoc(logRef, { msg: `MERGED ${toDelete.length} duplikat rekod`, admin: currentAdmin, timestamp: serverTimestamp() });
        }
    }

    // --------------------- SUBMIT with 3s debounce ---------------------
    let submitLock = false;
    const executeSubmit = async (name, cls, type, time) => {
        if(submitLock) return alert("Tunggu sebentar...");
        submitLock = true;
        document.getElementById('btnSubmit').disabled = true;
        try {
            const kDate = new Date(document.getElementById('keyinDate').value);
            const dateStr = kDate.toLocaleDateString('en-GB');
            const fullTime = `${dateStr}, ${time}`;
            const entry = { type, time: fullTime, by: currentAdmin };
            
            // merge duplicates first
            await mergeDuplicates();

            const q = query(colRef, where("name", "==", name.toUpperCase()), where("class", "==", cls.toUpperCase()));
            const snap = await getDocs(q);
            
            if(!snap.empty) {
                const d = snap.docs[0];
                const existing = d.data().offences || [];
                // avoid exact duplicate time+type
                const dup = existing.find(o => o.time === fullTime && o.type === type);
                if(dup) {
                    alert("Rekod ini sudah wujud pada masa yang sama.");
                    submitLock = false;
                    document.getElementById('btnSubmit').disabled = false;
                    return;
                }
                await updateDoc(doc(db, "students", d.id), {
                    offences: [entry, ...existing],
                    counts: increment(1)
                });
            } else {
                await addDoc(colRef, { name: name.toUpperCase(), class: cls.toUpperCase(), offences: [entry], counts: 1 });
            }
            await addDoc(logRef, { msg: `TAMBAH: ${type} - ${name}`, admin: currentAdmin, timestamp: serverTimestamp() });
            alert("Berjaya Disimpan!");
            location.reload();
        } catch(e) { alert("Ralat: "+e.message); }
        setTimeout(() => {
            submitLock = false;
            document.getElementById('btnSubmit').disabled = false;
        }, 3000);
    };

    document.getElementById('btnSubmit').onclick = () => {
        const name = document.getElementById('stuName').value.trim();
        const cls = document.getElementById('stuClass').value.trim();
        const type = document.getElementById('violation').value;
        const time = document.getElementById('violationTime').value;
        if(!name || !cls || !type || !time) return alert("Sila lengkapkan!");
        if(type === "Lewat") {
            document.getElementById('sebabModal').style.display = 'flex';
        } else { executeSubmit(name, cls, type, time); }
    };

    // Sebab lewat
    const sebabList = ["Bangun Lewat", "Masalah Kenderaan", "Sakit Perut", "Masalah Trafik", "Masalah Keluarga"];
    document.getElementById('sebabButtons').innerHTML = sebabList.map(s => `<button class="sebab-btn">${s}</button>`).join('');
    document.querySelectorAll('.sebab-btn').forEach(btn => {
        btn.onclick = () => {
            const name = document.getElementById('stuName').value;
            const cls = document.getElementById('stuClass').value;
            const time = document.getElementById('violationTime').value;
            executeSubmit(name, cls, `Lewat (${btn.innerText})`, time);
            document.getElementById('sebabModal').style.display = 'none';
        };
    });
    document.getElementById('btnCancelSebab').onclick = () => document.getElementById('sebabModal').style.display = 'none';

    // Snapshot students
    onSnapshot(colRef, async (snap) => {
        allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        // auto-merge on load
        await mergeDuplicates();
        render();
        updateStats();
    });

    onSnapshot(query(logRef, orderBy("timestamp", "desc"), limit(12)), (snap) => {
        let html = "";
        snap.forEach(d => {
            const data = d.data();
            const t = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "...";
            html += `<div class="log-entry"><span>[${t}]</span><span class="log-msg">${data.msg}</span><span class="log-admin">@${data.admin}</span></div>`;
        });
        document.getElementById('logDisplay').innerHTML = html || "Tiada log.";
    });

    function render() {
        const search = document.getElementById('searchBox').value.toUpperCase();
        const filterDateInput = document.getElementById('reportDate').value;
        const targetDate = filterDateInput ? new Date(filterDateInput).toLocaleDateString('en-GB') : null;
        const sortBy = document.getElementById('sortType').value;

        let filtered = allData.filter(s => s.name.includes(search) || s.class.includes(search));
        if(targetDate) filtered = filtered.filter(s => s.offences?.some(o => o.time.includes(targetDate)));

        filtered.sort((a, b) => {
            if(sortBy === 'name') return a.name.localeCompare(b.name);
            if(sortBy === 'counts') return (b.counts||0) - (a.counts||0);
            const timeA = a.offences?.length ? parseTime(a.offences[0].time) : 0;
            const timeB = b.offences?.length ? parseTime(b.offences[0].time) : 0;
            return sortBy === 'dateNew' ? timeB - timeA : timeA - timeB;
        });

        const btnRep = document.getElementById('btnStudentReport');
        if(search.length > 2 && filtered.length === 1) {
            selectedStudent = filtered[0];
            btnRep.style.display = 'inline-block';
            btnRep.innerText = `PRINT ${selectedStudent.name}`;
        } else { btnRep.style.display = 'none'; }

        let html = "";
        filtered.forEach(s => {
            const sortedOff = [...(s.offences || [])].sort((a,b) => parseTime(b.time) - parseTime(a.time));
            const grouped = sortedOff.reduce((acc, curr) => {
                const base = curr.type.split(' (')[0];
                acc[base] = (acc[base] || 0) + 1;
                return acc;
            }, {});

            let tags = "";
            for (const [type, count] of Object.entries(grouped)) {
                let cls = type === "Lewat" ? "tag-late" : (["Buli", "Bergaduh", "Diskriminasi"].includes(type) ? "tag-bad" : "tag-other");
                tags += `<span class="offence-tag ${cls}" onclick="window.openHist('${s.id}', '${type}')">${type} ${count>1?'x'+count:''}</span>`;
            }

            html += `<tr class="${(s.counts||0) >= 3 ? 'highlight-row' : ''}">
                <td style="word-wrap:break-word;"><b>${s.name}</b><br><small style="color:var(--accent)">${s.class}</small></td>
                <td>${tags}</td>
                <td style="text-align:center"><span class="count-badge">${s.counts||0}</span></td>
                <td><button class="delete-btn" onclick="window.delStu('${s.id}')">Hapus</button></td>
            </tr>`;
        });
        document.getElementById('recordBody').innerHTML = html || `<tr><td colspan="4" style="text-align:center;color:#555;">Tiada rekod</td></tr>`;
    }

    window.openHist = (id, type) => {
        const s = allData.find(x => x.id === id);
        if(!s) return;
        const list = s.offences.filter(o => o.type.startsWith(type)).sort((a,b) => parseTime(b.time) - parseTime(a.time));
        document.getElementById('modalTitle').innerText = `${type} - ${s.name}`;
        document.getElementById('historyList').innerHTML = list.map(i => `
            <div class="history-item">
                <span>${i.time}<br><small>Oleh: ${i.by}</small></span>
                <button class="delete-btn" onclick="window.delOne('${id}', '${i.time}')">PADAM</button>
            </div>`).join('');
        document.getElementById('historyModal').style.display = 'flex';
    };

    window.delStu = async (id) => {
        const s = allData.find(x => x.id === id);
        if(!s) return;
        if(confirm(`Hapus SEMUA rekod ${s.name}?`)) {
            await deleteDoc(doc(db, "students", id));
            await addDoc(logRef, { msg: `PADAM PELAJAR: ${s.name}`, admin: currentAdmin, timestamp: serverTimestamp() });
        }
    };

    window.delOne = async (id, time) => {
        const s = allData.find(x => x.id === id);
        if(!s) return;
        const newArr = s.offences.filter(o => o.time !== time);
        if(newArr.length === 0) await deleteDoc(doc(db, "students", id));
        else await updateDoc(doc(db, "students", id), { offences: newArr, counts: newArr.length });
        await addDoc(logRef, { msg: `PADAM REKOD: ${s.name} (${time})`, admin: currentAdmin, timestamp: serverTimestamp() });
        document.getElementById('historyModal').style.display = 'none';
    };

    const updateStats = () => {
        const sel = document.getElementById('statsMonth').value;
        if(!sel) return;
        const [y, m] = sel.split('-');
        const target = `/${m}/${y}`;
        const stats = {};
        allData.forEach(s => s.offences?.forEach(o => {
            if(o.time.includes(target)) {
                const base = o.type.split(' (')[0];
                stats[base] = (stats[base] || 0) + 1;
            }
        }));
        const types = ["Lewat", "Ponteng Kelas", "Buli", "Bergaduh", "Barang Larangan", "Salah Guna Dadah/Merokok", "Isu Trafik", "Lain-lain"];
        document.getElementById('statsDisplay').innerHTML = types.map(t => `<div class="stat-card"><span class="stat-val">${stats[t]||0}</span><span class="stat-lbl">${t}</span></div>`).join('');
    };

    // ----- PRINT FUNCTIONS (PREVIEW & PRINT) -----
    function generatePrintHTML(title, records) {
        let container = document.getElementById('printContainer');
        container.innerHTML = "";
        const stats = {};
        records.forEach(r => {
            const base = r.type.split(' (')[0];
            stats[base] = (stats[base] || 0) + 1;
        });
        const types = ["Lewat", "Ponteng Kelas", "Buli", "Bergaduh", "Barang Larangan", "Salah Guna Dadah/Merokok", "Isu Trafik", "Lain-lain"];
        let summaryBoxes = "";
        types.forEach(t => {
            if(stats[t]) summaryBoxes += `<div class="summary-box"><p>${t.toUpperCase()}</p><h2>${stats[t]}</h2></div>`;
        });
        if(!summaryBoxes) summaryBoxes = `<div class="summary-box"><p>Tiada data</p><h2>0</h2></div>`;

        container.innerHTML += `
            <div class="print-page-wrapper">
                <div class="print-header-content">
                    <img src="semsira.png" alt="Logo">
                    <div style="flex:1">
                        <h1 style="margin:0; font-size:20px;">RINGKASAN KESALAHAN</h1>
                        <p style="margin:0; font-size:14px; font-weight:bold;">${title}</p>
                    </div>
                </div>
                <div class="print-summary-grid">${summaryBoxes}</div>
                <div class="print-footer-content">
                    <div style="text-align:center; width:100%;">
                        <p style="margin-bottom:40px;">Disahkan Oleh:</p>
                        <p>___________________________</p>
                        <p style="font-weight:bold;">(Pegawai Bertugas)</p>
                    </div>
                </div>
            </div>`;

        const chunkSize = 10;
        for (let i = 0; i < records.length; i += chunkSize) {
            const chunk = records.slice(i, i + chunkSize);
            const rows = chunk.map(r => `
                <tr>
                    <td>${r.name}</td>
                    <td>${r.class}</td>
                    <td>${r.type}</td>
                    <td>${r.time}</td>
                    <td>${r.by}</td>
                </tr>`).join('');
            container.innerHTML += `
                <div class="print-page-wrapper">
                    <div class="print-header-content">
                        <img src="semsira.png" alt="Logo">
                        <div style="flex:1">
                            <h1 style="margin:0; font-size:16px;">SENARAI TERPERINCI</h1>
                            <p style="margin:0; font-size:12px;">${title} (Bahagian ${Math.floor(i/chunkSize)+1})</p>
                        </div>
                    </div>
                    <table>
                        <thead><tr><th width="25%">Nama</th><th width="20%">Kelas</th><th width="30%">Kesalahan</th><th width="15%">Masa/Tarikh</th><th width="10%">Admin</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="print-footer-content">
                        <div style="text-align:center; width:100%;">
                            <p style="margin-bottom:40px;">Disahkan Oleh:</p>
                            <p>___________________________</p>
                            <p style="font-weight:bold;">(Pegawai Bertugas)</p>
                        </div>
                    </div>
                </div>`;
        }
        return container;
    }

    function doPrint(title, records) {
        if(!records.length) return alert("Tiada data untuk dicetak.");
        generatePrintHTML(title, records);
        window.print();
    }

    function doPreview(title, records) {
        if(!records.length) return alert("Tiada data untuk preview.");
        generatePrintHTML(title, records);
        document.getElementById('printContainer').style.display = 'block';
        alert("Preview sedia. Tutup tab cetak untuk kembali.");
        window.print();
    }

    // Daily preview & print
    document.getElementById('btnPreviewDaily').onclick = () => {
        const dInput = document.getElementById('reportDate').value;
        if(!dInput) return alert("Pilih tarikh!");
        const target = new Date(dInput).toLocaleDateString('en-GB');
        let res = [];
        allData.forEach(s => s.offences?.forEach(o => {
            if(o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o });
        }));
        doPreview(`LAPORAN HARIAN - ${target}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };
    document.getElementById('btnPrintDaily').onclick = () => {
        const dInput = document.getElementById('reportDate').value;
        if(!dInput) return alert("Pilih tarikh!");
        const target = new Date(dInput).toLocaleDateString('en-GB');
        let res = [];
        allData.forEach(s => s.offences?.forEach(o => {
            if(o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o });
        }));
        doPrint(`LAPORAN HARIAN - ${target}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };

    // Monthly preview & print
    document.getElementById('btnPreviewMonthly').onclick = () => {
        const sel = document.getElementById('statsMonth').value;
        if(!sel) return alert("Pilih bulan!");
        const [y, m] = sel.split('-');
        const target = `/${m}/${y}`;
        let res = [];
        allData.forEach(s => s.offences?.forEach(o => {
            if(o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o });
        }));
        doPreview(`LAPORAN BULANAN - ${m}/${y}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };
    document.getElementById('btnPrintMonthly').onclick = () => {
        const sel = document.getElementById('statsMonth').value;
        if(!sel) return alert("Pilih bulan!");
        const [y, m] = sel.split('-');
        const target = `/${m}/${y}`;
        let res = [];
        allData.forEach(s => s.offences?.forEach(o => {
            if(o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o });
        }));
        doPrint(`LAPORAN BULANAN - ${m}/${y}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };

    document.getElementById('btnStudentReport').onclick = () => {
        if(!selectedStudent) return;
        const offences = selectedStudent.offences || [];
        doPrint(`REKOD INDIVIDU: ${selectedStudent.name}`, offences);
    };

    // event listeners
    document.getElementById('searchBox').onkeyup = render;
    document.getElementById('reportDate').onchange = render;
    document.getElementById('sortType').onchange = (e) => {
        localStorage.setItem('bdp_sort', e.target.value);
        render();
    };
    document.getElementById('manualToggle').onclick = () => {
        document.getElementById('selClass').value = "MANUAL";
        document.getElementById('selClass').dispatchEvent(new Event('change'));
    };
    document.getElementById('btnMasterReset').onclick = async () => {
        if(confirm("AWAS! Padam SEMUA data tahunan?") && prompt("Taip 'PADAM2026' untuk sahkan:") === "PADAM2026") {
            const qs = await getDocs(colRef);
            const batch = writeBatch(db);
            qs.forEach(d => batch.delete(d.ref));
            await batch.commit();
            alert("Data dikosongkan.");
            location.reload();
        }
    };

    // initial merge
    setTimeout(mergeDuplicates, 1000);
</script>
</body>
</html>
