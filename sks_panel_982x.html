<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Pengurusan Pelajar | SEMSIRA BDP</title>
    <link rel="icon" type="image/png" href="semsira.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --accent: #f1c40f;
            --bg: #0a0a0a;
            --card: #181818;
            --text: #ffffff;
            --tag-late: #f1c40f;
            --tag-skip: #e67e22;
            --tag-bad: #e74c3c;
            --tag-other: #3498db;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            padding-bottom: 70px;
        }

        .navbar {
            background: #000;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #222;
            flex-wrap: wrap;
            gap: 8px;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-brand img {
            height: 38px;
            width: auto;
        }
        .nav-brand h1 {
            font-size: 15px;
            color: var(--accent);
            margin: 0;
            letter-spacing: 0.5px;
        }
        .nav-right {
            font-size: 11px;
            color: #666;
            text-align: right;
            line-height: 1.4;
        }
        .nav-right span {
            color: var(--accent);
        }

        .container {
            max-width: 100%;
            padding: 12px 12px 20px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            padding: 16px 14px;
            border-radius: 14px;
            margin-bottom: 18px;
            border: 1px solid #222;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 6px;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-end;
        }
        .input-row label {
            font-size: 10px;
            color: var(--accent);
            display: block;
            margin-bottom: 2px;
        }
        .input-row .field {
            flex: 1 1 130px;
            min-width: 110px;
        }

        input, select {
            background: #0f0f0f;
            border: 1px solid #333;
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
            outline: none;
        }
        input::placeholder {
            color: #555;
        }

        .btn {
            background: var(--accent);
            color: #000;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active {
            opacity: 0.7;
        }

        .btn-secondary {
            background: #2980b9;
            color: white;
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .btn-danger {
            background: #440000;
            color: #ff4d4d;
            border: 1px solid #442222;
        }

        .log-panel {
            background: #050505;
            border: 1px solid #222;
            border-radius: 12px;
            height: 140px;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #111;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .log-msg {
            color: #bbb;
            flex: 1;
            margin: 0 8px;
        }
        .log-admin {
            color: var(--accent);
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .stat-card {
            background: #0a0a0a;
            padding: 10px 6px;
            border-radius: 8px;
            border: 1px solid #333;
            text-align: center;
        }
        .stat-val {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent);
            display: block;
        }
        .stat-lbl {
            font-size: 8px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
            font-size: 13px;
        }
        th {
            color: #666;
            padding: 6px 4px;
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        td {
            background: #1a1a1a;
            padding: 10px 8px;
            border-top: 1px solid #282828;
            border-bottom: 1px solid #282828;
            word-break: break-word;
            vertical-align: middle;
        }
        .highlight-row td {
            background: #2c0a0a !important;
            border-color: #5a1010 !important;
        }

        .offence-tag {
            display: inline-block;
            padding: 4px 8px;
            margin: 2px 3px 2px 0;
            border-radius: 4px;
            font-size: 9px;
            font-weight: bold;
            background: #222;
            border-left: 3px solid #555;
            cursor: pointer;
        }
        .tag-late {
            border-left-color: var(--tag-late);
            color: var(--tag-late);
        }
        .tag-skip {
            border-left-color: var(--tag-skip);
            color: var(--tag-skip);
        }
        .tag-bad {
            border-left-color: var(--tag-bad);
            color: var(--tag-bad);
        }
        .tag-other {
            border-left-color: var(--tag-other);
            color: var(--tag-other);
        }

        .count-badge {
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
        }

        .delete-btn {
            background: #221111;
            color: #ff4d4d;
            border: 1px solid #442222;
            font-size: 9px;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-content {
            background: #181818;
            padding: 20px 16px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
            max-height: 80vh;
            overflow-y: auto;
        }
        .sebab-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .sebab-btn {
            background: #222;
            color: #fff;
            padding: 12px 10px;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 12px;
            gap: 8px;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin: 10px 0 6px;
        }
        .filter-bar input, .filter-bar select {
            flex: 1 1 120px;
            min-width: 100px;
            padding: 8px 10px;
            font-size: 12px;
        }
        .flex-between {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .small-note {
            color: #555;
            font-size: 11px;
            cursor: pointer;
            margin-top: 4px;
        }

        /* Print */
        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            body {
                background: white !important;
                color: black !important;
                margin: 0;
                padding: 0;
            }
            body * {
                visibility: hidden;
            }
            #printContainer, #printContainer * {
                visibility: visible;
            }
            #printContainer {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                display: block !important;
                background: white;
            }
            .no-print {
                display: none !important;
            }
            .print-page-wrapper {
                width: 210mm;
                height: 297mm;
                padding: 15mm;
                box-sizing: border-box;
                break-after: page;
                display: flex;
                flex-direction: column;
                background: white;
            }
            .print-header-content {
                display: flex !important;
                align-items: center;
                border-bottom: 2px solid black;
                padding-bottom: 10px;
                margin-bottom: 15px;
            }
            .print-header-content img {
                height: 50px !important;
                width: auto !important;
                margin-right: 15px !important;
            }
            .print-summary-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                margin-top: 16px;
            }
            .summary-box {
                border: 2px solid black;
                padding: 12px;
                text-align: center;
            }
            .summary-box h2 {
                font-size: 32px;
                margin: 4px 0;
            }
            table {
                border-collapse: collapse;
                width: 100%;
                margin-top: 10px;
            }
            th, td {
                border: 1px solid black !important;
                padding: 6px !important;
                color: black !important;
                font-size: 10px;
                background: transparent !important;
            }
            .print-footer-content {
                margin-top: auto;
                display: flex;
                justify-content: flex-end;
                width: 100%;
                padding-top: 20px;
            }
        }
        #printContainer {
            display: none;
        }
        .suggestion-box {
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
            margin-top: 4px;
            padding: 4px 0;
        }
        .suggestion-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
        }
        .suggestion-item:active {
            background: #2a2a2a;
        }
        .suggestion-item .sub {
            color: var(--accent);
            font-size: 10px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="navbar no-print">
    <div class="nav-brand"><img src="semsira.png" alt="Logo"><h1>SEMSIRA BDP</h1></div>
    <div class="nav-right">OPERATOR: <span id="displayAdmin">...</span><br><span style="color:#27ae60;">SISTEM AKTIF</span></div>
</div>

<div class="container no-print">
    <!-- KEMASUKAN -->
    <div class="card">
        <h3 style="font-size:16px; margin-bottom:10px;">1. REKOD KEMASUKAN</h3>
        <div class="input-group">
            <div class="input-row">
                <div class="field"><label>TARIKH</label><input type="date" id="keyinDate"></div>
                <div class="field"><label>KELAS</label>
                    <select id="selClass"><option value="">Memuatkan...</option></select>
                    <input type="text" id="stuClass" placeholder="Manual Kelas" style="display:none; margin-top:4px;">
                </div>
                <div class="field"><label>NAMA</label>
                    <input type="text" id="stuName" placeholder="Taip nama..." autocomplete="off">
                    <div id="suggestionBox" class="suggestion-box" style="display:none;"></div>
                </div>
            </div>
            <div class="input-row">
                <div class="field"><label>MASA</label><input type="time" id="violationTime"></div>
                <div class="field" style="flex:2;"><label>KESALAHAN</label>
                    <select id="violation">
                        <option value="" disabled selected>Pilih...</option>
                        <option value="Lewat">Lewat</option>
                        <option value="Ponteng Kelas">Ponteng Kelas</option>
                        <option value="Buli">Buli</option>
                        <option value="Bergaduh">Bergaduh</option>
                        <option value="Diskriminasi">Diskriminasi</option>
                        <option value="Barang Larangan">Barang Larangan</option>
                        <option value="Salah Guna Dadah/Merokok">Salah Guna Dadah/Merokok</option>
                        <option value="Isu Trafik">Isu Trafik</option>
                        <option value="Lain-lain">Lain-lain</option>
                    </select>
                </div>
                <div style="display:flex; gap:6px; flex:1;">
                    <button class="btn" id="btnPreview" style="background:#8e44ad; color:white; flex:1;">PREVIEW</button>
                    <button class="btn" id="btnSubmit" style="flex:1;">SIMPAN</button>
                </div>
            </div>
            <div class="small-note" id="manualToggle">* Input manual / tambah kelas</div>
        </div>
    </div>

    <!-- STATS -->
    <div class="card">
        <div class="flex-between">
            <h3 style="font-size:15px;">2. ANALISIS BULANAN</h3>
            <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
                <input type="month" id="statsMonth" style="width:140px; padding:6px 8px; font-size:12px;">
                <button class="btn btn-secondary" id="btnPrintMonthly" style="font-size:10px; padding:6px 12px;">PRINT BULANAN</button>
            </div>
        </div>
        <div class="stats-grid" id="statsDisplay"></div>
    </div>

    <!-- LOG -->
    <div class="card">
        <h3 style="font-size:15px;">3. LOG AKTIVITI</h3>
        <div class="log-panel" id="logDisplay">Memuatkan log...</div>
    </div>

    <!-- SENARAI -->
    <div class="card" style="background:transparent; border:none; padding:0;">
        <div class="flex-between">
            <h3 style="font-size:15px;">4. SENARAI DISIPLIN</h3>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <select id="sortType" style="width:130px; font-size:11px; padding:6px;">
                    <option value="name">A-Z</option>
                    <option value="counts">Jumlah Kes</option>
                    <option value="dateNew">Tarikh Terbaharu</option>
                    <option value="dateOld">Tarikh Terlama</option>
                </select>
                <button class="btn btn-secondary" id="btnStudentReport" style="font-size:9px; padding:4px 10px; display:none;">PRINT INDIVIDU</button>
            </div>
        </div>
        <div class="filter-bar">
            <input type="text" id="searchBox" placeholder="Cari nama / kelas..." style="flex:2;">
            <input type="date" id="reportDate" style="flex:1;">
            <button class="btn btn-success" id="btnPrintDaily" style="font-size:11px; padding:6px 12px;">PRINT HARIAN</button>
        </div>
        <table>
            <thead><tr><th width="25%">Identiti</th><th width="45%">Kesalahan</th><th width="15%" style="text-align:center">Jumlah</th><th width="15%">Aksi</th></tr></thead>
            <tbody id="recordBody"></tbody>
        </table>
    </div>

    <div style="display:flex; justify-content:flex-end; margin-top:10px;">
        <button class="btn btn-danger" id="btnMasterReset" style="font-size:10px; padding:6px 14px;">RESET TAHUNAN</button>
    </div>
</div>

<!-- PRINT CONTAINER -->
<div id="printContainer"></div>

<!-- MODAL SEBAB -->
<div id="sebabModal" class="modal"><div class="modal-content">
    <h4 style="color:var(--accent); margin-top:0;">PILIH SEBAB LEWAT</h4>
    <div class="sebab-grid" id="sebabButtons"></div>
    <button id="btnCancelSebab" class="btn" style="width:100%; margin-top:12px; background:#444; color:white;">BATAL</button>
</div></div>

<!-- MODAL SEJARAH -->
<div id="historyModal" class="modal"><div class="modal-content">
    <h4 id="modalTitle" style="color:var(--accent); margin-top:0;">Sejarah</h4>
    <div id="historyList"></div>
    <button onclick="document.getElementById('historyModal').style.display='none'" class="btn" style="width:100%; margin-top:12px; background:#444; color:white;">TUTUP</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, where, getDocs, increment, orderBy, limit, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        databaseURL: "https://bdpsemsira-5c274-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    const colRef = collection(db, "students");
    const logRef = collection(db, "logs");

    let allData = [];
    let rtdbData = {};
    let selectedStudent = null;
    const currentAdmin = (sessionStorage.getItem('admin_name') || "ADMIN").split('@')[0].toUpperCase();
    document.getElementById('displayAdmin').innerText = currentAdmin;
    document.getElementById('keyinDate').valueAsDate = new Date();
    document.getElementById('statsMonth').value = new Date().toISOString().slice(0, 7);
    document.getElementById('sortType').value = localStorage.getItem('bdp_sort') || 'name';
    document.getElementById('violationTime').value = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});

    // ----- Helper parse time -----
    const parseTime = (str) => {
        try {
            const [dStr, tStr] = str.split(', ');
            const [d, m, y] = dStr.split('/');
            const [hh, mm] = tStr.split(':');
            return new Date(y, m-1, d, hh, mm).getTime();
        } catch(e) { return 0; }
    };

    // ----- Load kelas dari RTDB -----
    onValue(ref(rtdb, "/"), (snap) => {
        rtdbData = snap.val() || {};
        const selClass = document.getElementById('selClass');
        let html = '<option value="">Pilih...</option>';
        const classList = Object.keys(rtdbData).sort();
        classList.forEach(c => html += `<option value="${c}">${c}</option>`);
        html += '<option value="MANUAL">-- MANUAL --</option>';
        selClass.innerHTML = html;
    });

    // ----- Suggestion (auto lengkap) -----
    const stuNameInput = document.getElementById('stuName');
    const suggestionBox = document.getElementById('suggestionBox');
    let suggestionData = [];

    function updateSuggestion(input, selectedClass) {
        const val = input.value.trim().toUpperCase();
        if (!val || val.length < 1 || !selectedClass || selectedClass === 'MANUAL') {
            suggestionBox.style.display = 'none';
            return;
        }
        // cari dalam rtdbData[selectedClass]
        const students = rtdbData[selectedClass] || [];
        const matched = students.filter(s => s.toUpperCase().includes(val)).slice(0, 8);
        if (matched.length === 0) {
            suggestionBox.style.display = 'none';
            return;
        }
        suggestionData = matched;
        let html = '';
        matched.forEach(s => {
            html += `<div class="suggestion-item" data-name="${s}">${s} <span class="sub">${selectedClass}</span></div>`;
        });
        suggestionBox.innerHTML = html;
        suggestionBox.style.display = 'block';
    }

    stuNameInput.addEventListener('input', () => {
        const cls = document.getElementById('stuClass').value || document.getElementById('selClass').value;
        if (cls && cls !== 'MANUAL') {
            updateSuggestion(stuNameInput, cls);
        } else {
            suggestionBox.style.display = 'none';
        }
    });

    suggestionBox.addEventListener('click', (e) => {
        const item = e.target.closest('.suggestion-item');
        if (item) {
            const name = item.dataset.name;
            stuNameInput.value = name;
            suggestionBox.style.display = 'none';
        }
    });
    document.addEventListener('click', (e) => {
        if (!suggestionBox.contains(e.target) && e.target !== stuNameInput) {
            suggestionBox.style.display = 'none';
        }
    });

    // ----- Kelas change -----
    document.getElementById('selClass').onchange = (e) => {
        const val = e.target.value;
        const stuClass = document.getElementById('stuClass');
        const stuName = document.getElementById('stuName');
        if (val === "MANUAL") {
            stuClass.style.display = 'block';
            stuClass.value = '';
            stuName.value = '';
            suggestionBox.style.display = 'none';
        } else {
            stuClass.style.display = 'none';
            stuClass.value = val;
            stuName.value = '';
            suggestionBox.style.display = 'none';
        }
    };

    // ----- Submit dengan dedup (gabung rekod sama) -----
    const executeSubmit = async (name, cls, type, time) => {
        const kDate = new Date(document.getElementById('keyinDate').value);
        const dateStr = kDate.toLocaleDateString('en-GB');
        const fullTime = `${dateStr}, ${time}`;
        const entry = { type, time: fullTime, by: currentAdmin };

        // cari pelajar dengan nama & kelas
        const q = query(colRef, where("name", "==", name.toUpperCase()), where("class", "==", cls.toUpperCase()));
        const snap = await getDocs(q);
        
        if (!snap.empty) {
            const d = snap.docs[0];
            const existing = d.data().offences || [];
            // Semak jika ada rekod sama (type + time) -> gabung / elak duplicate
            const duplicateIdx = existing.findIndex(o => o.type === type && o.time === fullTime);
            if (duplicateIdx !== -1) {
                alert("Rekod sama sudah wujud. Gabung automatik.");
                return;
            }
            await updateDoc(doc(db, "students", d.id), {
                offences: [entry, ...existing],
                counts: increment(1)
            });
        } else {
            await addDoc(colRef, { name: name.toUpperCase(), class: cls.toUpperCase(), offences: [entry], counts: 1 });
        }
        await addDoc(logRef, { msg: `TAMBAH: ${type} - ${name}`, admin: currentAdmin, timestamp: serverTimestamp() });
        alert("Berjaya Disimpan!");
        location.reload();
    };

    // ----- Preview (tunjuk rekod yang akan disimpan) -----
    document.getElementById('btnPreview').onclick = () => {
        const name = document.getElementById('stuName').value.trim();
        const cls = document.getElementById('stuClass').value.trim() || document.getElementById('selClass').value;
        const type = document.getElementById('violation').value;
        const time = document.getElementById('violationTime').value;
        if (!name || !cls || !type || !time) return alert("Sila lengkapkan semua medan!");
        alert(`PREVIEW:\nNama: ${name}\nKelas: ${cls}\nKesalahan: ${type}\nMasa: ${time}\nAdmin: ${currentAdmin}`);
    };

    // ----- Submit utama -----
    document.getElementById('btnSubmit').onclick = () => {
        let name = document.getElementById('stuName').value.trim();
        let cls = document.getElementById('stuClass').value.trim() || document.getElementById('selClass').value;
        const type = document.getElementById('violation').value;
        const time = document.getElementById('violationTime').value;
        if (!name || !cls || !type || !time) return alert("Sila lengkapkan!");
        if (cls === 'MANUAL' || cls === '') return alert("Sila pilih atau taip kelas yang sah.");
        // Jika nama dari suggestion, pastikan uppercase
        name = name.toUpperCase();
        cls = cls.toUpperCase();
        if (type === "Lewat") {
            document.getElementById('sebabModal').style.display = 'flex';
        } else { executeSubmit(name, cls, type, time); }
    };

    // Sebab lewat
    const sebabList = ["Bangun Lewat", "Masalah Kenderaan", "Sakit Perut", "Masalah Trafik", "Masalah Keluarga"];
    document.getElementById('sebabButtons').innerHTML = sebabList.map(s => `<button class="sebab-btn">${s}</button>`).join('');
    document.querySelectorAll('.sebab-btn').forEach(btn => {
        btn.onclick = () => {
            const name = document.getElementById('stuName').value.trim().toUpperCase();
            const cls = document.getElementById('stuClass').value.trim().toUpperCase() || document.getElementById('selClass').value.toUpperCase();
            const time = document.getElementById('violationTime').value;
            executeSubmit(name, cls, `Lewat (${btn.innerText})`, time);
        };
    });
    document.getElementById('btnCancelSebab').onclick = () => document.getElementById('sebabModal').style.display = 'none';

    // ----- OnSnapshot -----
    onSnapshot(colRef, (snap) => {
        allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
        updateStats();
    });

    onSnapshot(query(logRef, orderBy("timestamp", "desc"), limit(10)), (snap) => {
        let html = "";
        snap.forEach(d => {
            const data = d.data();
            const t = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "...";
            html += `<div class="log-entry"><span>[${t}]</span><span class="log-msg">${data.msg}</span><span class="log-admin">@${data.admin}</span></div>`;
        });
        document.getElementById('logDisplay').innerHTML = html;
    });

    // ----- Render dengan filter & sort -----
    function render() {
        const search = document.getElementById('searchBox').value.toUpperCase();
        const filterDateInput = document.getElementById('reportDate').value;
        const targetDate = filterDateInput ? new Date(filterDateInput).toLocaleDateString('en-GB') : null;
        const sortBy = document.getElementById('sortType').value;

        let filtered = allData.filter(s => s.name.includes(search) || s.class.includes(search));
        if (targetDate) filtered = filtered.filter(s => s.offences?.some(o => o.time.includes(targetDate)));

        filtered.sort((a, b) => {
            if (sortBy === 'name') return a.name.localeCompare(b.name);
            if (sortBy === 'counts') return b.counts - a.counts;
            const timeA = a.offences ? parseTime(a.offences[0].time) : 0;
            const timeB = b.offences ? parseTime(b.offences[0].time) : 0;
            return sortBy === 'dateNew' ? timeB - timeA : timeA - timeB;
        });

        const btnRep = document.getElementById('btnStudentReport');
        if (search.length > 1 && filtered.length === 1) {
            selectedStudent = filtered[0];
            btnRep.style.display = 'block';
            btnRep.innerText = `PRINT: ${selectedStudent.name}`;
        } else { btnRep.style.display = 'none'; }

        let html = "";
        filtered.forEach(s => {
            const sortedOff = [...(s.offences || [])].sort((a,b) => parseTime(b.time) - parseTime(a.time));
            // Gabung jenis kesalahan yang sama (auto merge)
            const grouped = sortedOff.reduce((acc, curr) => {
                const base = curr.type.split(' (')[0];
                acc[base] = (acc[base] || 0) + 1;
                return acc;
            }, {});

            let tags = "";
            for (const [type, count] of Object.entries(grouped)) {
                let cls = type === "Lewat" ? "tag-late" : (["Buli", "Bergaduh", "Diskriminasi"].includes(type) ? "tag-bad" : "tag-other");
                tags += `<span class="offence-tag ${cls}" onclick="window.openHist('${s.id}', '${type}')">${type} ${count>1?'x'+count:''}</span>`;
            }

            html += `<tr class="${s.counts >= 3 ? 'highlight-row' : ''}">
                <td style="word-wrap:break-word;"><b>${s.name}</b><br><small style="color:var(--accent)">${s.class}</small></td>
                <td>${tags}</td>
                <td style="text-align:center"><span class="count-badge">${s.counts}</span></td>
                <td><button class="delete-btn" onclick="window.delStu('${s.id}')">Hapus</button></td>
            </tr>`;
        });
        document.getElementById('recordBody').innerHTML = html;
    }

    window.openHist = (id, type) => {
        const s = allData.find(x => x.id === id);
        if (!s) return;
        const list = s.offences.filter(o => o.type.startsWith(type)).sort((a,b) => parseTime(b.time) - parseTime(a.time));
        document.getElementById('modalTitle').innerText = type + " - " + s.name;
        document.getElementById('historyList').innerHTML = list.map(i => `
            <div class="history-item">
                <span>${i.time}<br><small>Oleh: ${i.by}</small></span>
                <button class="delete-btn" onclick="window.delOne('${id}', '${i.time}')">PADAM</button>
            </div>`).join('');
        document.getElementById('historyModal').style.display = 'flex';
    };

    window.delStu = async (id) => {
        const s = allData.find(x => x.id === id);
        if (confirm(`Hapus SEMUA rekod ${s.name}?`)) {
            await deleteDoc(doc(db, "students", id));
            await addDoc(logRef, { msg: `PADAM PELAJAR: ${s.name}`, admin: currentAdmin, timestamp: serverTimestamp() });
        }
    };

    window.delOne = async (id, time) => {
        const s = allData.find(x => x.id === id);
        const newArr = s.offences.filter(o => o.time !== time);
        if (newArr.length === 0) await deleteDoc(doc(db, "students", id));
        else await updateDoc(doc(db, "students", id), { offences: newArr, counts: newArr.length });
        await addDoc(logRef, { msg: `PADAM REKOD: ${s.name} (${time})`, admin: currentAdmin, timestamp: serverTimestamp() });
        document.getElementById('historyModal').style.display = 'none';
    };

    // ----- Stats -----
    const updateStats = () => {
        const sel = document.getElementById('statsMonth').value;
        if (!sel) return;
        const [y, m] = sel.split('-');
        const target = `/${m}/${y}`;
        const stats = {};
        allData.forEach(s => s.offences?.forEach(o => {
            if (o.time.includes(target)) {
                const base = o.type.split(' (')[0];
                stats[base] = (stats[base] || 0) + 1;
            }
        }));
        const types = ["Lewat", "Ponteng Kelas", "Buli", "Bergaduh", "Barang Larangan", "Salah Guna Dadah/Merokok", "Isu Trafik", "Lain-lain"];
        document.getElementById('statsDisplay').innerHTML = types.map(t => `<div class="stat-card"><span class="stat-val">${stats[t]||0}</span><span class="stat-lbl">${t}</span></div>`).join('');
    };

    // ----- PRINT functions -----
    const doPrint = (title, records) => {
        const container = document.getElementById('printContainer');
        container.innerHTML = "";

        const stats = {};
        records.forEach(r => {
            const base = r.type.split(' (')[0];
            stats[base] = (stats[base] || 0) + 1;
        });
        const types = ["Lewat", "Ponteng Kelas", "Buli", "Bergaduh", "Barang Larangan", "Salah Guna Dadah/Merokok", "Isu Trafik", "Lain-lain"];
        let summaryBoxes = "";
        types.forEach(t => {
            if (stats[t]) summaryBoxes += `<div class="summary-box"><p>${t.toUpperCase()}</p><h2>${stats[t]}</h2></div>`;
        });

        container.innerHTML += `
            <div class="print-page-wrapper">
                <div class="print-header-content">
                    <img src="semsira.png" alt="Logo">
                    <div style="flex:1"><h1 style="margin:0; font-size:20px;">RINGKASAN KESALAHAN</h1><p style="margin:0; font-size:14px; font-weight:bold;">${title}</p></div>
                </div>
                <div class="print-summary-grid">${summaryBoxes}</div>
                <div class="print-footer-content"><div style="text-align:center;"><p style="margin-bottom:40px;">Disahkan Oleh:</p><p>___________________________</p><p style="font-weight:bold;">(Pegawai Bertugas)</p></div></div>
            </div>`;

        const chunkSize = 10;
        for (let i = 0; i < records.length; i += chunkSize) {
            const chunk = records.slice(i, i + chunkSize);
            const rows = chunk.map(r => `
                <tr><td>${r.name}</td><td>${r.class}</td><td>${r.type}</td><td>${r.time}</td><td>${r.by}</td></tr>`).join('');
            container.innerHTML += `
                <div class="print-page-wrapper">
                    <div class="print-header-content">
                        <img src="semsira.png" alt="Logo">
                        <div style="flex:1"><h1 style="margin:0; font-size:16px;">SENARAI TERPERINCI</h1><p style="margin:0; font-size:11px;">${title} (Bahagian ${Math.floor(i/chunkSize)+1})</p></div>
                    </div>
                    <table><thead><tr><th width="25%">Nama</th><th width="20%">Kelas</th><th width="30%">Kesalahan</th><th width="15%">Masa/Tarikh</th><th width="10%">Admin</th></tr></thead><tbody>${rows}</tbody></table>
                    <div class="print-footer-content"><div style="text-align:center;"><p style="margin-bottom:40px;">Disahkan Oleh:</p><p>___________________________</p><p style="font-weight:bold;">(Pegawai Bertugas)</p></div></div>
                </div>`;
        }
        window.print();
    };

    document.getElementById('btnPrintDaily').onclick = () => {
        const dInput = document.getElementById('reportDate').value;
        if (!dInput) return alert("Pilih tarikh!");
        const target = new Date(dInput).toLocaleDateString('en-GB');
        let res = [];
        allData.forEach(s => s.offences.forEach(o => {
            if (o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o });
        }));
        if (res.length === 0) return alert("Tiada data.");
        doPrint(`LAPORAN HARIAN - ${target}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };

    document.getElementById('btnPrintMonthly').onclick = () => {
        const sel = document.getElementById('statsMonth').value;
        const [y, m] = sel.split('-');
        const target = `/${m}/${y}`;
        let res = [];
        allData.forEach(s => s.offences.forEach(o => {
            if (o.time.includes(target)) res.push({ name: s.name, class: s.class, ...o });
        }));
        if (res.length === 0) return alert("Tiada data.");
        doPrint(`LAPORAN BULANAN - ${m}/${y}`, res.sort((a,b) => parseTime(b.time) - parseTime(a.time)));
    };

    document.getElementById('btnStudentReport').onclick = () => {
        if (!selectedStudent) return;
        doPrint(`REKOD INDIVIDU: ${selectedStudent.name}`, selectedStudent.offences);
    };

    // ----- Event binding -----
    document.getElementById('searchBox').onkeyup = render;
    document.getElementById('reportDate').onchange = render;
    document.getElementById('sortType').onchange = (e) => {
        localStorage.setItem('bdp_sort', e.target.value);
        render();
    };
    document.getElementById('manualToggle').onclick = () => {
        document.getElementById('selClass').value = "MANUAL";
        document.getElementById('selClass').dispatchEvent(new Event('change'));
    };
    document.getElementById('btnMasterReset').onclick = async () => {
        if (confirm("AWAS! Padam SEMUA data tahunan?") && prompt("Taip 'PADAM2026' untuk sahkan:") === "PADAM2026") {
            const qs = await getDocs(colRef);
            const batch = writeBatch(db);
            qs.forEach(d => batch.delete(d.ref));
            await batch.commit();
            alert("Data dikosongkan.");
            location.reload();
        }
    };
</script>
</body>
</html>
